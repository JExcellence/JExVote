# ╔═══════════════════════════════════════════════════════════════╗
# ║                  JExVote — Reward Configuration              ║
# ╠═══════════════════════════════════════════════════════════════╣
# ║  Each reward needs a unique key and a 'type' field.          ║
# ║  Uses JExPlatform's universal reward system.                  ║
# ║                                                               ║
# ║  Available reward types:                                      ║
# ║    command, xp, currency, item, permission, sound, particle,  ║
# ║    teleport, title, composite, choice, custom,                ║
# ║    chance, lucky  (JExVote — Lucky Vote)                      ║
# ╚═══════════════════════════════════════════════════════════════╝

# ── Default Rewards ─────────────────────────────────────────────
# Granted every time a player votes, regardless of site or streak.
default-rewards:
  # Oneblock-relevant baseline: a little XP + coins into the economy every vote.
  vote-xp:    { type: xp,       amount: 35 }
  vote-coins: { type: currency, currency: coins, amount: 800.0 }
  # Vote Jackpot / "Lucky Vote" (live): every vote also rolls exactly ONE prize
  # from this weighted pool. Weights sum to EXACTLY 100, so each weight IS its
  # drop chance in %. Shown in /vote rewards with per-entry odds + drop counts
  # (id drives the stat).
  #
  # Design (2026-07-10 rework): voting is a casual daily habit, so ~78% of rolls
  # are pocket-change (small coins / XP / a couple diamonds) — a pleasant "thanks
  # for voting", never a payout. The middle band (~17%) is a nice hit (coin stack,
  # Vote key, a small +2 island expansion). The rare band (~4%) is real value
  # (10k coins, 1 netherite scrap, Shadow key). The ultra band (<0.6%) is the
  # dream: a Void key, a sliver of premium Crystals, and the two real-money-tier
  # keys pushed to lottery odds — a Dragon key at 0.05% and a Season key at just
  # 0.01% (~1 in 10 000 votes). Strict rules honoured: no 2× netherite ever
  # (scrap, x1, rare), Crystals granted sparingly (premium currency), and the
  # $20-tier keys are practically unreachable here — they live in the shop/ranks.
  vote-jackpot:
    type: lucky
    entries:
      # -- Common (~78%) — casual "thanks for voting" --
      - weight: 30          # 30% — pocket change
        id: 'jackpot-coins-small'
        reward: { type: currency, currency: coins, amount: 600.0 }
      - weight: 20          # 20% — a little XP
        id: 'jackpot-xp'
        reward: { type: xp, amount: 100 }
      - weight: 15          # 15% — a couple diamonds
        id: 'jackpot-diamonds'
        reward: { type: item, material: DIAMOND, amount: 2 }
      - weight: 13          # 13% — a tidy coin stack
        id: 'jackpot-coins-medium'
        reward: { type: currency, currency: coins, amount: 2500.0 }
      # -- Uncommon (~17%) — a nice little hit --
      - weight: 8           # 8% — a fat coin stack
        id: 'jackpot-coins-large'
        reward: { type: currency, currency: coins, amount: 5000.0 }
      - weight: 5           # 5% — a Vote Crate key
        id: 'jackpot-vote-crate'
        announce: 'vote.lucky.jackpot'
        reward: { type: command, command: 'ac virtualkey give {player} VoteCrate 1', asConsole: true }
      - weight: 4           # 4% — a small island expansion (+2 radius, server-capped)
        id: 'jackpot-region'
        announce: 'vote.lucky.jackpot'
        reward: { type: command, command: 'jexoneblock grant-radius {player} 2', asConsole: true }
      # -- Rare (~4%) — genuine value --
      - weight: 2           # 2% — the coin jackpot
        id: 'jackpot-coins-huge'
        announce: 'vote.lucky.jackpot'
        reward: { type: currency, currency: coins, amount: 10000.0 }
      - weight: 1.5         # 1.5% — 1 netherite scrap (never 2 ingots)
        id: 'jackpot-netherite-scrap'
        reward: { type: item, material: NETHERITE_SCRAP, amount: 1 }
      - weight: 0.9         # 0.9% — a Shadow Crate key
        id: 'jackpot-shadow-crate'
        announce: 'vote.lucky.jackpot'
        reward: { type: command, command: 'ac virtualkey give {player} ShadowCrate 1', asConsole: true }
      # -- Ultra-rare (<0.6%) — the dream pulls --
      - weight: 0.4         # 0.4% — a Void Crate key
        id: 'jackpot-void-crate'
        announce: 'vote.lucky.jackpot'
        reward: { type: command, command: 'ac virtualkey give {player} VoidCrate 1', asConsole: true }
      - weight: 0.14        # 0.14% — a sliver of premium Crystals (granted sparingly)
        id: 'jackpot-crystals'
        announce: 'vote.lucky.jackpot'
        reward: { type: currency, currency: crystals, amount: 3.0 }
      - weight: 0.05        # 0.05% — Dragon Crate key ($20-tier: lottery odds)
        id: 'jackpot-dragon-crate'
        announce: 'vote.lucky.jackpot'
        reward: { type: command, command: 'ac virtualkey give {player} DragonCrate 1', asConsole: true }
      - weight: 0.01        # 0.01% — Season Crate key (~1 in 10 000 votes; the rarest prize)
        id: 'jackpot-season-crate'
        announce: 'vote.lucky.jackpot'
        reward: { type: command, command: 'ac virtualkey give {player} SeasonCrate 1', asConsole: true }

# ── Streak Rewards ──────────────────────────────────────────────
# Bonus rewards when a player reaches a specific streak day. IN ADDITION to
# the default rewards, shown in /vote (Streak Rewards): the milestone grid
# lists every tier, and clicking one opens its full reward list.
#
# Eleven oneblock-themed milestones (1/3/7/14/21/30/60/90/120/180/365) form a
# loyalty ladder. Rebalanced 2026-07-11 for oneblock reality: voting is a light
# daily habit, so EARLY days are modest (a starter server key + coins + a small
# useful item), the MID ladder adds a decent — never OP — enchanted tool and the
# first Void/Shadow keys, and DAY 30 is a UNIQUE prestige milestone. Long-tail
# capstones (60+) reward the grind with keys/coins/region/cosmetics.
#
# Hard rules (matches the suite reward-design + econ audit):
#   - NO real-money-tier keys as streak prizes. Season & Dragon crates (~$20)
#     are reserved for the shop, the final rank, and the 0.01% lucky-vote pull.
#     Streaks grant only VoteCrate / VoidCrate / ShadowCrate (earned server keys).
#   - Gear: diamond only, Unbreaking (never Mending), no netherite, tops out
#     mid-ladder. No block-of-X handouts, no beacons/nether-stars as loot.
#   - Coins stay modest early ("voting ≠ big money"); capstones scale because
#     they represent months of unbroken voting.
#   - Region expansion (jexoneblock grant-radius, server-capped) is the mid/late
#     "feels great" reward instead of raw diamonds.
#
#   Day  Tier      Server key(s)            Headline
#   ──── ───────── ──────────────────────── ──────────────────────────────
#    1   Spark     —                        Voter's Iron (8 ingots, warm-up)
#    3   Sprout    VoteCrate                45m flytime + 16 iron (no diamonds)
#    7   Settler   VoteCrate ×2             Voter's Pickaxe (Eff III/Unbr III) + 4💎
#   14   Veteran   VoidCrate                +5 island radius + 8💎
#   21   Champion  VoidCrate + ShadowCrate  Champion's Drill (Eff IV/Unbr III) + 12💎
#   30   Legend    ShadowCrate              ★ UNIQUE: Devoted Voter's Crown + +15 radius
#   60   Eternal   ShadowCrate + VoidCrate  +10 radius, resources
#   90   Immortal  ShadowCrate ×2           2× Totem, +10 radius
#  120   Ascended  VoidCrate ×2             +15 radius, resources
#  180   Devoted   ShadowCrate ×2+VoidCrate +20 radius, cosmetic
#  365   Undying   ShadowCrate ×2+VoidCrate ×2  ★ UNIQUE: Undying Voter's Heart + +25 radius
#
# Crate keys use 'ac virtualkey give <player> <Crate> <amount>' as console
# (AdvancedCrates). Region uses 'jexoneblock grant-radius <player> <n>'.
streak-rewards:

  # ── Day 1 · Spark ───────────────────────────────────────────────
  1:
    streak-1-xp:        { type: xp,       amount: 50 }
    streak-1-coins:     { type: currency, currency: coins, amount: 1500.0 }
    streak-1-iron:
      type: item
      material: IRON_INGOT
      amount: 8
      name: "<gradient:#ffffff:#bdc3c7>Voter's Iron</gradient>"
      lore:
        - "<gray>A warm-up reward for showing up."

  # ── Day 3 · Sprout ──────────────────────────────────────────────
  # No diamonds this early — a starter key, a little coin, some iron, and a
  # taste of flight. A 3-day habit, not a jackpot.
  3:
    streak-3-xp:        { type: xp,       amount: 80 }
    streak-3-coins:     { type: currency, currency: coins, amount: 2000.0 }
    streak-3-crate:     { type: command,  command: 'ac virtualkey give {player} VoteCrate 1', asConsole: true }
    # Island flight time — granted via the JExOneblock flytime command (clamped to
    # the player's flytime cap). The recipient must be online when the streak fires.
    streak-3-flytime:   { type: command,  command: 'jexoneblock flytime {player} 45', asConsole: true }
    streak-3-iron:
      type: item
      material: IRON_INGOT
      amount: 16
      name: "<gradient:#ffffff:#bdc3c7>Voter's Ingots</gradient>"
      lore:
        - "<gray>Three days in — keep it going."

  # ── Day 7 · Settler ─────────────────────────────────────────────
  # A week earns a decent (not OP) tool + a couple diamonds. NO real-money key.
  7:
    streak-7-xp:        { type: xp,       amount: 150 }
    streak-7-coins:     { type: currency, currency: coins, amount: 4000.0 }
    streak-7-crate:     { type: command,  command: 'ac virtualkey give {player} VoteCrate 2', asConsole: true }
    streak-7-pickaxe:
      type: item
      material: DIAMOND_PICKAXE
      amount: 1
      name: "<gradient:#55ff55:#16a34a>Voter's Pickaxe</gradient>"
      lore:
        - "<gray>Forged from a week of devotion."
      enchantments:
        efficiency: 3
        unbreaking: 3
      glow: true
    streak-7-diamonds:  { type: item, material: DIAMOND, amount: 4 }

  # ── Day 14 · Veteran ────────────────────────────────────────────
  14:
    streak-14-xp:       { type: xp,       amount: 250 }
    streak-14-coins:    { type: currency, currency: coins, amount: 8000.0 }
    streak-14-crate:    { type: command,  command: 'ac virtualkey give {player} VoidCrate 1', asConsole: true }
    # First taste of island expansion — feels great, server-capped.
    streak-14-radius:   { type: command,  command: 'jexoneblock grant-radius {player} 5', asConsole: true }
    streak-14-diamonds: { type: item, material: DIAMOND, amount: 8 }

  # ── Day 21 · Champion ───────────────────────────────────────────
  # Top of the gear chain: a strong Unbreaking drill (no Mending, no netherite).
  21:
    streak-21-xp:       { type: xp,       amount: 400 }
    streak-21-coins:    { type: currency, currency: coins, amount: 12000.0 }
    streak-21-crate:    { type: command,  command: 'ac virtualkey give {player} VoidCrate 1', asConsole: true }
    streak-21-shadow-key: { type: command, command: 'ac virtualkey give {player} ShadowCrate 1', asConsole: true }
    streak-21-pickaxe:
      type: item
      material: DIAMOND_PICKAXE
      amount: 1
      name: "<gradient:#aa55ff:#6c3483>Champion's Drill</gradient>"
      lore:
        - "<gray>Carves through the void itself."
      enchantments:
        efficiency: 4
        unbreaking: 3
      glow: true
    streak-21-diamonds: { type: item, material: DIAMOND, amount: 12 }

  # ── Day 30 · Legend ★ UNIQUE ────────────────────────────────────
  # The signature milestone. A one-of-a-kind cosmetic crown you can ONLY get by
  # holding a 30-day streak, a Shadow key, a big island expansion, and coins.
  # No gear power, no real-money key — the prestige IS the crown.
  30:
    streak-30-xp:       { type: xp,       amount: 800 }
    streak-30-coins:    { type: currency, currency: coins, amount: 25000.0 }
    streak-30-crate:    { type: command,  command: 'ac virtualkey give {player} ShadowCrate 1', asConsole: true }
    # Big, memorable island expansion — the "feels legendary" reward.
    streak-30-radius:   { type: command,  command: 'jexoneblock grant-radius {player} 15', asConsole: true }
    streak-30-crown:
      type: item
      material: GOLDEN_HELMET
      amount: 1
      name: "<gradient:#ffd700:#e67e22>Devoted Voter's Crown</gradient>"
      lore:
        - "<gray>30 days. Not one vote missed."
        - "<dark_gray>A cosmetic crown — worn only by the truly devoted."
        - ""
        - "<gradient:#fde047:#f59e0b>✦ Streak Milestone — Day 30 ✦</gradient>"
      enchantments:
        unbreaking: 3
      glow: true

  # ── Day 60 · Eternal ────────────────────────────────────────────
  # Long-tail: keys + coins + region + resources. No new gear, no $20 keys.
  60:
    streak-60-xp:       { type: xp,       amount: 1200 }
    streak-60-coins:    { type: currency, currency: coins, amount: 40000.0 }
    streak-60-crate:    { type: command,  command: 'ac virtualkey give {player} ShadowCrate 1', asConsole: true }
    streak-60-void-key: { type: command,  command: 'ac virtualkey give {player} VoidCrate 1', asConsole: true }
    streak-60-radius:   { type: command,  command: 'jexoneblock grant-radius {player} 10', asConsole: true }
    streak-60-diamonds: { type: item, material: DIAMOND, amount: 16 }

  # ── Day 90 · Immortal ───────────────────────────────────────────
  90:
    streak-90-xp:       { type: xp,       amount: 1500 }
    streak-90-coins:    { type: currency, currency: coins, amount: 60000.0 }
    streak-90-crate:    { type: command,  command: 'ac virtualkey give {player} ShadowCrate 2', asConsole: true }
    streak-90-radius:   { type: command,  command: 'jexoneblock grant-radius {player} 10', asConsole: true }
    # Vanilla-balanced safety item, not gear — no stat/damage/mining bonus.
    streak-90-totems:   { type: item, material: TOTEM_OF_UNDYING, amount: 2 }

  # ── Day 120 · Ascended ──────────────────────────────────────────
  120:
    streak-120-xp:      { type: xp,       amount: 2000 }
    streak-120-coins:   { type: currency, currency: coins, amount: 80000.0 }
    streak-120-crate:   { type: command,  command: 'ac virtualkey give {player} VoidCrate 2', asConsole: true }
    streak-120-radius:  { type: command,  command: 'jexoneblock grant-radius {player} 15', asConsole: true }
    streak-120-diamonds: { type: item, material: DIAMOND, amount: 24 }

  # ── Day 180 · Devoted ───────────────────────────────────────────
  180:
    streak-180-xp:      { type: xp,       amount: 3000 }
    streak-180-coins:   { type: currency, currency: coins, amount: 120000.0 }
    streak-180-crate:   { type: command,  command: 'ac virtualkey give {player} ShadowCrate 2', asConsole: true }
    streak-180-void-key: { type: command, command: 'ac virtualkey give {player} VoidCrate 1', asConsole: true }
    streak-180-radius:  { type: command,  command: 'jexoneblock grant-radius {player} 20', asConsole: true }
    streak-180-diamonds: { type: item, material: DIAMOND, amount: 32 }

  # ── Day 365 · Undying ★ UNIQUE ──────────────────────────────────
  # A full unbroken year — the ceiling. A second unique cosmetic, the biggest
  # region grant, keys and coins. Still no real-money-tier key: a year-long
  # streak is prestige, not a shortcut to the $20 crates.
  365:
    streak-365-xp:      { type: xp,       amount: 5000 }
    streak-365-coins:   { type: currency, currency: coins, amount: 200000.0 }
    streak-365-crate:   { type: command,  command: 'ac virtualkey give {player} ShadowCrate 2', asConsole: true }
    streak-365-void-key: { type: command, command: 'ac virtualkey give {player} VoidCrate 2', asConsole: true }
    streak-365-radius:  { type: command,  command: 'jexoneblock grant-radius {player} 25', asConsole: true }
    # Cosmetic capstone, no stats — same "no-OP" rule as the day-30 crown.
    streak-365-heart:
      type: item
      material: NETHER_STAR
      amount: 1
      name: "<gradient:#fde047:#e67e22>Undying Voter's Heart</gradient>"
      lore:
        - "<gray>365 days. Not one vote missed."
        - "<dark_gray>There is no higher tier than this."
        - ""
        - "<gradient:#fde047:#f59e0b>✦ Streak Milestone — Day 365 ✦</gradient>"
      glow: true

# ── Site-Specific Rewards ───────────────────────────────────────
# Extra rewards for voting on specific sites.
# Use the site ID (from sites.yml) as the key.
site-rewards: {}
