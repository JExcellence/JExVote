# ── Vote Party Rewards (Premium) ────────────────────────────────
# Granted to EVERY player who contributed to a vote party when it
# completes (online players immediately, offline players on next
# login). Configure the target/toggle under 'vote-party' in config.yml.
# NOTE: Vote Party is a Premium-edition feature — on the Free edition it
# stays disabled regardless of these settings.
#
# Two parts:
#   vote-party-rewards : a small GUARANTEED baseline granted to everyone.
#   vote-party-pool    : a weighted rotation. Each contributor receives 3
#                        guaranteed draws plus decaying-chance extras
#                        (75% then −8%/step, hard cap 10 total). Online
#                        players see a slot-machine reveal animation first.
vote-party-rewards:
  party-xp:    { type: xp,       amount: 200 }
  party-coins: { type: currency, currency: coins, amount: 10000.0 }

# Weighted party rotation — rare items + keys (small coin/XP allowed), kept
# deliberately not-OP. Each entry has a stable 'id' so its drop-% and pull
# count surface in the /vote party GUI (RewardStatsService).
vote-party-pool:
  type: lucky
  entries:
    # 50 entries, NO gear / NO elytra / nothing power-granting. Drop % shown in
    # the /vote party GUI is each entry's weight ÷ total weight.
    # ── Common — bulk materials & resources (keeps the economy fed) ──
    - { weight: 6,   id: 'party-cobble',       reward: { type: item, material: COBBLESTONE,      amount: 256 } }
