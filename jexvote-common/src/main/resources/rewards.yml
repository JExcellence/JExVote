# ╔═══════════════════════════════════════════════════════════════╗
# ║                  JExVote — Reward Configuration              ║
# ╠═══════════════════════════════════════════════════════════════╣
# ║  Each reward needs a unique key and a 'type' field.          ║
# ║  Uses JExPlatform's universal reward system.                  ║
# ║                                                               ║
# ║  Available reward types:                                      ║
# ║    command, xp, currency, item, permission, sound, particle,  ║
# ║    teleport, title, composite, choice, custom,                ║
# ║    chance, lucky  (JExVote — Lucky Vote)                      ║
# ╚═══════════════════════════════════════════════════════════════╝

# ── Default Rewards ─────────────────────────────────────────────
# Granted every time a player votes, regardless of site or streak.
default-rewards:
  # Oneblock-relevant baseline: a little XP + coins into the economy every vote.
  vote-xp:    { type: xp,       amount: 50 }
  vote-coins: { type: currency, currency: coins, amount: 2500.0 }
  # Vote Jackpot (live): every vote also rolls exactly ONE prize from this
  # weighted pool. Weights sum to 100, so each weight IS its drop chance in %.
  # Shown in /vote rewards with per-entry odds + drop counts (id drives the
  # stat). Ten oneblock-themed outcomes from common coins up to a Dragon Key.
  vote-jackpot:
    type: lucky
    entries:
      - weight: 28          # 28% — pocket change
        id: 'jackpot-coins-small'
        reward: { type: currency, currency: coins, amount: 1000.0 }
      - weight: 20          # 20% — a little XP
        id: 'jackpot-xp'
        reward: { type: xp, amount: 150 }
      - weight: 15          # 15% — a handful of diamonds
        id: 'jackpot-diamonds'
        reward: { type: item, material: DIAMOND, amount: 8 }
      - weight: 12          # 12% — a tidy coin stack
        id: 'jackpot-coins-medium'
        reward: { type: currency, currency: coins, amount: 5000.0 }
      - weight: 8           # 8% — netherite for the grind
        id: 'jackpot-netherite'
        reward: { type: item, material: NETHERITE_INGOT, amount: 2 }
      - weight: 6           # 6% — a Vote Crate key
        id: 'jackpot-vote-crate'
        announce: 'vote.lucky.jackpot'
        reward: { type: command, command: 'crate give key {player} vote_crate 1', asConsole: true }
      - weight: 4           # 4% — the coin jackpot (trimmed 25k→8k per "voting ≠ big money")
        id: 'jackpot-coins-large'
        announce: 'vote.lucky.jackpot'
        reward: { type: currency, currency: coins, amount: 8000.0 }
      - weight: 3.5         # 3.5% — a Season Crate key
        id: 'jackpot-season-crate'
        announce: 'vote.lucky.jackpot'
        reward: { type: command, command: 'crate give key {player} season_crate 1', asConsole: true }
      - weight: 2           # 2% — a Shadow Crate key
        id: 'jackpot-shadow-crate'
        announce: 'vote.lucky.jackpot'
        reward: { type: command, command: 'crate give key {player} shadow_crate 1', asConsole: true }
      - weight: 1.5         # 1.5% — the grand prize: a Dragon Crate key
        id: 'jackpot-dragon-crate'
        announce: 'vote.lucky.jackpot'
        reward: { type: command, command: 'crate give key {player} dragon_crate 1', asConsole: true }

# ── Streak Rewards ──────────────────────────────────────────────
# Bonus rewards when a player reaches a specific streak day. IN ADDITION to
# the default rewards, shown in /vote (Streak Rewards): the milestone grid
# lists every tier, and clicking one opens its full reward list.
#
# Five oneblock-themed milestones (3/7/14/21/30) form an escalating ladder.
# Every tier grants the SAME shape — Experience + Coins + a Crate Key + useful
# item(s) — so each streak day clearly steps up and stays worth voting for:
#
#   Day  Tier        Crate key       Headline gear
#   ──── ─────────── ─────────────── ───────────────────────────────
#    1   Spark       —               Voter's Iron (8 ingots, warm-up)
#    3   Sprout      vote_crate      Voter's Hoppers (automation)
#    7   Settler     season_crate    Voter's Pickaxe (Eff IV / Fortune II)
#   14   Veteran     2× vote_crate   Voter's Blade (Sharp V / Looting III)
#   21   Champion    void_crate      Champion's Drill (Eff VI / Fortune IV)
#   30   Legend      shadow_crate    Streak Master's Wings (Elytra)
#
# Crate ladder is deliberately toned down: dragon_crate is NOT a streak prize
# (only via the rarer jackpot/party). Crate keys use
# 'crate give key <player> <crate> <amount>' as console.
streak-rewards:

  # ── Day 1 · Spark ───────────────────────────────────────────────
  1:
    streak-1-xp:        { type: xp,       amount: 50 }
    streak-1-coins:     { type: currency, currency: coins, amount: 2500.0 }
    streak-1-iron:
      type: item
      material: IRON_INGOT
      amount: 8
      name: "<gradient:#ffffff:#bdc3c7>Voter's Iron</gradient>"
      lore:
        - "<gray>A warm-up reward for showing up."

  # ── Day 3 · Sprout ──────────────────────────────────────────────
  3:
    streak-3-xp:        { type: xp,       amount: 100 }
    streak-3-coins:     { type: currency, currency: coins, amount: 5000.0 }
    streak-3-crate:     { type: command,  command: 'crate give key {player} vote_crate 1', asConsole: true }
    streak-3-hoppers:
      type: item
      material: HOPPER
      amount: 16
      name: "<gradient:#ffffff:#bdc3c7>Voter's Hoppers</gradient>"
      lore:
        - "<gray>Automate your one block."
    streak-3-diamonds:  { type: item, material: DIAMOND, amount: 6 }

  # ── Day 7 · Settler ─────────────────────────────────────────────
  7:
    streak-7-xp:        { type: xp,       amount: 250 }
    streak-7-coins:     { type: currency, currency: coins, amount: 15000.0 }
    streak-7-crate:     { type: command,  command: 'crate give key {player} season_crate 1', asConsole: true }
    streak-7-pickaxe:
      type: item
      material: DIAMOND_PICKAXE
      amount: 1
      name: "<gradient:#55ff55:#16a34a>Voter's Pickaxe</gradient>"
      lore:
        - "<gray>Forged from a week of devotion."
      enchantments:
        efficiency: 4
        fortune: 2
        unbreaking: 3
        mending: 1
      glow: true
    streak-7-diamonds:  { type: item, material: DIAMOND, amount: 16 }

  # ── Day 14 · Veteran ────────────────────────────────────────────
  14:
    streak-14-xp:       { type: xp,       amount: 500 }
    streak-14-coins:    { type: currency, currency: coins, amount: 50000.0 }
    streak-14-crate:    { type: command,  command: 'crate give key {player} vote_crate 2', asConsole: true }
    streak-14-sword:
      type: item
      material: NETHERITE_SWORD
      amount: 1
      name: "<gradient:#5dade2:#2980b9>Voter's Blade</gradient>"
      lore:
        - "<gray>Loyalty sharpened to an edge."
      enchantments:
        sharpness: 5
        looting: 3
        unbreaking: 3
        mending: 1
      glow: true
    streak-14-netherite: { type: item, material: NETHERITE_INGOT, amount: 2 }
    streak-14-hoppers:   { type: item, material: HOPPER, amount: 32 }

  # ── Day 21 · Champion ───────────────────────────────────────────
  21:
    streak-21-xp:       { type: xp,       amount: 1000 }
    streak-21-coins:    { type: currency, currency: coins, amount: 75000.0 }
    streak-21-crate:    { type: command,  command: 'crate give key {player} void_crate 1', asConsole: true }
    streak-21-pickaxe:
      type: item
      material: NETHERITE_PICKAXE
      amount: 1
      name: "<gradient:#aa55ff:#6c3483>Champion's Drill</gradient>"
      lore:
        - "<gray>Carves through the void itself."
      enchantments:
        efficiency: 5
        fortune: 3
        unbreaking: 3
        mending: 1
      glow: true
    streak-21-shulkers:  { type: item, material: SHULKER_BOX, amount: 2 }
    streak-21-netherite: { type: item, material: NETHERITE_INGOT, amount: 4 }

  # ── Day 30 · Legend ─────────────────────────────────────────────
  30:
    streak-30-xp:       { type: xp,       amount: 2000 }
    streak-30-coins:    { type: currency, currency: coins, amount: 100000.0 }
    streak-30-crate:    { type: command,  command: 'crate give key {player} shadow_crate 1', asConsole: true }
    # No elytra (free flight is too OP for a vote reward). Capstone is a Beacon
    # — a build/status flex, not a power item.
    streak-30-beacon:
      type: item
      material: BEACON
      amount: 1
      name: "<gradient:#ffd700:#e67e22>Streak Master's Beacon</gradient>"
      lore:
        - "<gray>30 days of unbroken devotion."
        - "<dark_gray>A monument to your loyalty."
      glow: true
    streak-30-netherite: { type: item, material: NETHERITE_BLOCK, amount: 1 }
    # Value shifted off coins (350k→100k) onto items per the "voting ≠ big money" call.
    streak-30-diamond-blocks: { type: item, material: DIAMOND_BLOCK, amount: 8 }

