# ── Vote Party Rewards (Premium) ────────────────────────────────
# Granted to EVERY player who contributed to a vote party when it
# completes (online players immediately, offline players on next
# login). Configure the target/toggle under 'vote-party' in config.yml.
# NOTE: Vote Party is a Premium-edition feature — on the Free edition it
# stays disabled regardless of these settings.
#
# Two parts:
#   vote-party-rewards : a small GUARANTEED baseline granted to everyone.
#   vote-party-pool    : a weighted rotation. Each contributor receives 3
#                        guaranteed draws plus decaying-chance extras
#                        (75% then −8%/step, hard cap 10 total). Online
#                        players see a slot-machine reveal animation first.
vote-party-rewards:
  # Guaranteed to EVERY contributor when a party completes. Parties fire often
  # (every 100 votes), so the flat coin grant is kept modest — a participation
  # thank-you, not the payout. The real prize is the weighted pool roll below.
  party-xp:    { type: xp,       amount: 200 }
  party-coins: { type: currency, currency: coins, amount: 2500.0 }

# Weighted party rotation. Redesigned 2026-07-10 (econ pass):
#   - virtual keys (ac virtualkey give), matching the server key model
#   - Season key REMOVED from the pool — a real-money-tier key, reserved for the
#     final rank + the shop; it must never fall out of a free party
#   - Dragon key kept but ultra-rare (grand prize)
#   - dropped the OP handouts (netherite block, beacon, diamond blocks)
#   - added PARTY-EXCLUSIVE tools (named/enchanted, no Mending) you can only get
#     from a vote party
#   - added BORDER-EXTENSION prizes — win island radius from a party
# Each entry has a stable 'id' so its drop-% + pull count surface in /vote party.
vote-party-pool:
  type: lucky
  entries:
    # -- Common — bulk materials & resources (keeps the economy fed) --
    - { weight: 6,   id: 'party-cobble',       reward: { type: item, material: COBBLESTONE,      amount: 256 } }
    - { weight: 5,   id: 'party-iron-block',   reward: { type: item, material: IRON_BLOCK,       amount: 4 } }
    - { weight: 4.5, id: 'party-gold-block',   reward: { type: item, material: GOLD_BLOCK,       amount: 4 } }
    - { weight: 4.5, id: 'party-coins-small',  reward: { type: currency, currency: coins, amount: 3000.0 } }
    - { weight: 4,   id: 'party-copper-block', reward: { type: item, material: COPPER_BLOCK,     amount: 16 } }
    - { weight: 4,   id: 'party-coal-block',   reward: { type: item, material: COAL_BLOCK,       amount: 16 } }
    - { weight: 4,   id: 'party-redstone',     reward: { type: item, material: REDSTONE_BLOCK,   amount: 8 } }
    - { weight: 4,   id: 'party-hoppers',      reward: { type: item, material: HOPPER,           amount: 16 } }
    - { weight: 4,   id: 'party-xp-bottles',   reward: { type: item, material: EXPERIENCE_BOTTLE, amount: 16 } }
    - { weight: 3.5, id: 'party-lapis-block',  reward: { type: item, material: LAPIS_BLOCK,      amount: 8 } }
    - { weight: 3.5, id: 'party-oak-logs',     reward: { type: item, material: OAK_LOG,          amount: 64 } }
    - { weight: 3,   id: 'party-glass',        reward: { type: item, material: GLASS,            amount: 64 } }
    - { weight: 3,   id: 'party-sand',         reward: { type: item, material: SAND,             amount: 128 } }
    - { weight: 3,   id: 'party-bonemeal',     reward: { type: item, material: BONE_MEAL,        amount: 32 } }
    - { weight: 3,   id: 'party-food',         reward: { type: item, material: COOKED_BEEF,      amount: 32 } }
    - { weight: 3,   id: 'party-obsidian',     reward: { type: item, material: OBSIDIAN,         amount: 16 } }
    - { weight: 2.5, id: 'party-rails',        reward: { type: item, material: RAIL,             amount: 32 } }
    - { weight: 2.5, id: 'party-torches',      reward: { type: item, material: TORCH,            amount: 64 } }
    # -- Uncommon — chase mats, QoL, cosmetics, a vote key --
    - { weight: 4,   id: 'party-vote-key',     announce: 'vote.lucky.jackpot', reward: { type: command, command: 'ac virtualkey give {player} VoteCrate 1', asConsole: true } }
    - { weight: 3.5, id: 'party-diamonds',     reward: { type: item, material: DIAMOND,          amount: 12 } }
    - { weight: 2.5, id: 'party-emerald',      reward: { type: item, material: EMERALD,          amount: 16 } }
    - { weight: 2.5, id: 'party-quartz',       reward: { type: item, material: QUARTZ,           amount: 64 } }
    - { weight: 2.5, id: 'party-ender-pearls', reward: { type: item, material: ENDER_PEARL,      amount: 8 } }
    - { weight: 2.5, id: 'party-coins-medium', reward: { type: currency, currency: coins, amount: 6000.0 } }
    - { weight: 2,   id: 'party-concrete',     reward: { type: item, material: WHITE_CONCRETE,   amount: 64 } }
    - { weight: 2,   id: 'party-amethyst',     reward: { type: item, material: AMETHYST_BLOCK,   amount: 16 } }
    - { weight: 2,   id: 'party-glowstone',    reward: { type: item, material: GLOWSTONE,        amount: 32 } }
    - { weight: 2,   id: 'party-xp-large',     reward: { type: item, material: EXPERIENCE_BOTTLE, amount: 32 } }
    - { weight: 2,   id: 'party-nametags',     reward: { type: item, material: NAME_TAG,         amount: 4 } }
    # -- Cosmetic flavour (no power) --
    - { weight: 1.5, id: 'party-fireworks',    reward: { type: item, material: FIREWORK_ROCKET,  amount: 32 } }
    - { weight: 1.5, id: 'party-disc',         reward: { type: item, material: MUSIC_DISC_BLOCKS, amount: 1 } }
    - { weight: 1.5, id: 'party-banner',       reward: { type: item, material: PURPLE_BANNER,    amount: 4 } }
    # -- Party-EXCLUSIVE tools (named + enchanted, no Mending — party-only) --
    - { weight: 1.5, id: 'party-pickaxe',      announce: 'vote.lucky.jackpot', reward: { type: item, material: DIAMOND_PICKAXE, amount: 1, glow: true, name: '<gradient:#a855f7:#6366f1>Party Pickaxe</gradient>', lore: ['<gray>Won from a Vote Party.', '<dark_gray>Efficiency IV, Unbreaking III'], enchantments: { efficiency: 4, unbreaking: 3 } } }
    - { weight: 1.5, id: 'party-blade',        announce: 'vote.lucky.jackpot', reward: { type: item, material: DIAMOND_SWORD, amount: 1, glow: true, name: '<gradient:#a855f7:#e74c3c>Party Blade</gradient>', lore: ['<gray>Won from a Vote Party.', '<dark_gray>Sharpness IV, Unbreaking III'], enchantments: { sharpness: 4, unbreaking: 3 } } }
    - { weight: 1.2, id: 'party-spade',        announce: 'vote.lucky.jackpot', reward: { type: item, material: DIAMOND_SHOVEL, amount: 1, glow: true, name: '<gradient:#a855f7:#0891b2>Party Spade</gradient>', lore: ['<gray>Won from a Vote Party.', '<dark_gray>Efficiency IV, Unbreaking III'], enchantments: { efficiency: 4, unbreaking: 3 } } }
    # -- Rare — netherite mats, larger coin, border extension --
    - { weight: 2,   id: 'party-netherite-scrap', reward: { type: item, material: NETHERITE_SCRAP, amount: 3 } }
    - { weight: 1.5, id: 'party-coins-large',  reward: { type: currency, currency: coins, amount: 12000.0 } }
    - { weight: 1.5, id: 'party-border-small', announce: 'vote.lucky.jackpot', reward: { type: command, command: 'jexoneblock grant-radius {player} 2', asConsole: true } }
    - { weight: 1,   id: 'party-netherite-ingot', reward: { type: item, material: NETHERITE_INGOT, amount: 1 } }
    # -- Epic — shadow key, bigger border win --
    - { weight: 1.2, id: 'party-shadow-key',   announce: 'vote.lucky.jackpot', reward: { type: command, command: 'ac virtualkey give {player} ShadowCrate 1', asConsole: true } }
    - { weight: 0.6, id: 'party-border-large', announce: 'vote.lucky.jackpot', reward: { type: command, command: 'jexoneblock grant-radius {player} 5', asConsole: true } }
    # -- Legendary — void & dragon keys (the grand prizes) --
    - { weight: 0.8, id: 'party-void-key',     announce: 'vote.lucky.jackpot', reward: { type: command, command: 'ac virtualkey give {player} VoidCrate 1', asConsole: true } }
    - { weight: 0.25, id: 'party-dragon-key',  announce: 'vote.lucky.jackpot', reward: { type: command, command: 'ac virtualkey give {player} DragonCrate 1', asConsole: true } }


# ── Vote Party Animation & Sound Configuration ───────────────────
# Customize the slot-machine reveal animation when a vote party completes.
# These settings control the visual and audio experience for online players.
vote-party:
  # Animation settings
  animation:
    # Number of spin frames before revealing rewards
    spin-frames: 14
    # Ticks between each spin frame (20 ticks = 1 second)
    frame-ticks: 3
    # Number of guaranteed pool draws per contributor
    guaranteed-picks: 3
    # Maximum total pool draws (guaranteed + extras)
    max-total-picks: 10
    # Starting chance for extra rolls (decays by extra-step each step)
    extra-start-chance: 0.75
    # Chance decay per extra roll step
    extra-step: 0.08

  # Sound settings
  sounds:
    # Sound played during spin animation
    spin: BLOCK_NOTE_BLOCK_HAT
    spin-volume: 0.7
    spin-pitch-base: 1.0
    spin-pitch-step: 0.1
    # Sound played on reveal
    reveal: UI_TOAST_CHALLENGE_COMPLETE
    reveal-volume: 1.0
    reveal-pitch: 1.0

  # Title settings (MiniMessage format)
  titles:
    # Title shown during spin animation
    spin: '<gradient:#fde047:#f59e0b>★ VOTE PARTY ★</gradient>'
    # Title shown on reveal
    reveal: '<gradient:#86efac:#16a34a>✦ REWARDS! ✦</gradient>'
    # Subtitle shown on reveal (supports {count} placeholder)
    reveal-subtitle: '<gray>You won <gradient:#fde047:#f59e0b>{count}</gradient> rewards!</gray>'
    # Title timing (milliseconds)
    fade-in: 0
    stay: 200
    fade-out: 0

# ── Vote-Token Shop (/vote shop) ────────────────────────────────
# The primary sink for vote points (earned ~1 per vote). Rebuilt 2026-07-11:
# a curated, oneblock-relevant catalog with a per-item `description:` (the
# MiniMessage lore preview the GUI shows), thematic icons, and fair non-OP
# pricing. Fields per entry:
#   name        — display name (MiniMessage-safe plain text)
#   icon        — GUI material (pick one that PREVIEWS the reward)
#   cost        — price in vote points
#   description — lore lines shown on the tile (what you're actually buying)
#   reward      — the granted reward (item / currency / command)
#   purchase-*  — optional sound/volume/pitch/messages (defaults are fine)
#
# Curation rules: useful oneblock resources, island expansion, flight time,
# crate keys, and a little cosmetic flavour. The $20-tier Season/Dragon keys
# are here as LONG-TERM goals (priced high). Removed the odd Shulker/NameTag
