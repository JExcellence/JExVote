# ╔═══════════════════════════════════════════════════════════════╗
# ║                  JExVote — Reward Configuration              ║
# ╠═══════════════════════════════════════════════════════════════╣
# ║  Each reward needs a unique key and a 'type' field.          ║
# ║  Uses JExPlatform's universal reward system.                  ║
# ║                                                               ║
# ║  Available reward types:                                      ║
# ║    command, xp, currency, item, permission, sound, particle,  ║
# ║    teleport, title, composite, choice, custom,                ║
# ║    chance, lucky  (JExVote — Lucky Vote)                      ║
# ╚═══════════════════════════════════════════════════════════════╝

# ── Default Rewards ─────────────────────────────────────────────
# Granted every time a player votes, regardless of site or streak.
default-rewards:
  # Oneblock-relevant baseline: a little XP + coins into the economy every vote.
  vote-xp:    { type: xp,       amount: 35 }
  vote-coins: { type: currency, currency: coins, amount: 800.0 }
  # Vote Jackpot / "Lucky Vote" (live): every vote also rolls exactly ONE prize
  # from this weighted pool. Weights sum to EXACTLY 100, so each weight IS its
  # drop chance in %. Shown in /vote rewards with per-entry odds + drop counts
  # (id drives the stat).
  #
  # Design (2026-07-10 rework): voting is a casual daily habit, so ~78% of rolls
  # are pocket-change (small coins / XP / a couple diamonds) — a pleasant "thanks
  # for voting", never a payout. The middle band (~17%) is a nice hit (coin stack,
  # Vote key, a small +2 island expansion). The rare band (~4%) is real value
  # (10k coins, 1 netherite scrap, Shadow key). The ultra band (<0.6%) is the
  # dream: a Void key, a sliver of premium Crystals, and the two real-money-tier
  # keys pushed to lottery odds — a Dragon key at 0.05% and a Season key at just
  # 0.01% (~1 in 10 000 votes). Strict rules honoured: no 2× netherite ever
  # (scrap, x1, rare), Crystals granted sparingly (premium currency), and the
  # $20-tier keys are practically unreachable here — they live in the shop/ranks.
  vote-jackpot:
    type: lucky
    entries:
      # -- Common (~78%) — casual "thanks for voting" --
      - weight: 30          # 30% — pocket change
        id: 'jackpot-coins-small'
        reward: { type: currency, currency: coins, amount: 600.0 }
      - weight: 20          # 20% — a little XP
        id: 'jackpot-xp'
        reward: { type: xp, amount: 100 }
      - weight: 15          # 15% — a couple diamonds
        id: 'jackpot-diamonds'
        reward: { type: item, material: DIAMOND, amount: 2 }
      - weight: 13          # 13% — a tidy coin stack
        id: 'jackpot-coins-medium'
        reward: { type: currency, currency: coins, amount: 2500.0 }
      # -- Uncommon (~17%) — a nice little hit --
      - weight: 8           # 8% — a fat coin stack
        id: 'jackpot-coins-large'
        reward: { type: currency, currency: coins, amount: 5000.0 }
      - weight: 5           # 5% — a Vote Crate key
        id: 'jackpot-vote-crate'
        announce: 'vote.lucky.jackpot'
        reward: { type: command, command: 'ac virtualkey give {player} VoteCrate 1', asConsole: true }
      - weight: 4           # 4% — a small island expansion (+2 radius, server-capped)
        id: 'jackpot-region'
        announce: 'vote.lucky.jackpot'
        reward: { type: command, command: 'jexoneblock grant-radius {player} 2', asConsole: true }
      # -- Rare (~4%) — genuine value --
      - weight: 2           # 2% — the coin jackpot
        id: 'jackpot-coins-huge'
        announce: 'vote.lucky.jackpot'
        reward: { type: currency, currency: coins, amount: 10000.0 }
      - weight: 1.5         # 1.5% — 1 netherite scrap (never 2 ingots)
        id: 'jackpot-netherite-scrap'
        reward: { type: item, material: NETHERITE_SCRAP, amount: 1 }
      - weight: 0.9         # 0.9% — a Shadow Crate key
        id: 'jackpot-shadow-crate'
        announce: 'vote.lucky.jackpot'
        reward: { type: command, command: 'ac virtualkey give {player} ShadowCrate 1', asConsole: true }
      # -- Ultra-rare (<0.6%) — the dream pulls --
      - weight: 0.4         # 0.4% — a Void Crate key
        id: 'jackpot-void-crate'
        announce: 'vote.lucky.jackpot'
        reward: { type: command, command: 'ac virtualkey give {player} VoidCrate 1', asConsole: true }
      - weight: 0.14        # 0.14% — a sliver of premium Crystals (granted sparingly)
        id: 'jackpot-crystals'
        announce: 'vote.lucky.jackpot'
        reward: { type: currency, currency: crystals, amount: 3.0 }
      - weight: 0.05        # 0.05% — Dragon Crate key ($20-tier: lottery odds)
        id: 'jackpot-dragon-crate'
        announce: 'vote.lucky.jackpot'
        reward: { type: command, command: 'ac virtualkey give {player} DragonCrate 1', asConsole: true }
      - weight: 0.01        # 0.01% — Season Crate key (~1 in 10 000 votes; the rarest prize)
        id: 'jackpot-season-crate'
        announce: 'vote.lucky.jackpot'
        reward: { type: command, command: 'ac virtualkey give {player} SeasonCrate 1', asConsole: true }

# ── Streak Rewards ──────────────────────────────────────────────
# Bonus rewards when a player reaches a specific streak day. IN ADDITION to
# the default rewards, shown in /vote (Streak Rewards): the milestone grid
# lists every tier, and clicking one opens its full reward list.
#
# Ten oneblock-themed milestones form an escalating-then-flat ladder, aligned
# to the "next milestone" countdown VoteOverviewView already shows players
# (7/14/30/60/90/120/180/365) — that UI used to promise streak days this file
# had no rewards for at all; the ladder now actually reaches every one of them.
# Every tier grants the SAME shape — Experience + Coins + a Crate Key + useful
# item(s) — so each streak day clearly steps up and stays worth voting for.
# Gear tops out at day 21 (diamond, no Mending, no netherite — see the
# no-OP rule below); day 30+ scales resources/currency/keys/cosmetics only,
# so long streaks stay rewarding WITHOUT the ladder ever escalating power:
#
#   Day  Tier        Crate key                    Headline item
#   ──── ─────────── ──────────────────────────── ───────────────────────────
#    1   Spark       —                            Voter's Iron (8 ingots, warm-up)
#    3   Sprout      vote_crate                   Voter's Hoppers (automation)
#    7   Settler     season_crate                 Voter's Pickaxe (Eff IV / Fortune II)
#   14   Veteran     2× vote_crate                Voter's Blade (Sharp V / Looting III, diamond)
#   21   Champion    void_crate                   Champion's Drill (Eff V / Fortune III)
#   30   Legend      shadow_crate+season          Streak Master's Trophy (cosmetic, no stats)
#   60   Eternal     dragon_crate+season          — (resources/QoL only, no new gear)
#   90   Immortal    dragon_crate+shadow          2× Totem of Undying (vanilla-balanced, no armor)
#  120   Ascended    dragon_crate+void            — (resources/QoL only, no new gear)
#  180   Devoted     dragon_crate+void+shadow     1× Beacon (cosmetic flex, no stat bonus by itself)
#  365   Undying     dragon_crate+void+shadow+season  Undying Voter's Heart (cosmetic, no stats)
#
# Strict no-OP rule for this ladder: NO Mending (Unbreaking only), NO
# netherite gear, NO new power past day 21 — day 30+ milestones are
# currency/resources/crate-keys/cosmetics so a long streak stays worth
# grinding without ever becoming an equipment escalation. dragon_crate is
# otherwise NOT a streak prize (only via the rarer jackpot/party) — day 60+
# is the sole exception, since a 60+ day unbroken streak is a rarer feat
# than any single vote-party contribution. Crate keys use
# 'ac virtualkey give <player> <Crate> <amount>' as console (AdvancedCrates).
streak-rewards:

  # ── Day 1 · Spark ───────────────────────────────────────────────
  1:
    streak-1-xp:        { type: xp,       amount: 50 }
    streak-1-coins:     { type: currency, currency: coins, amount: 2500.0 }
    streak-1-iron:
      type: item
      material: IRON_INGOT
      amount: 8
      name: "<gradient:#ffffff:#bdc3c7>Voter's Iron</gradient>"
      lore:
        - "<gray>A warm-up reward for showing up."

  # ── Day 3 · Sprout ──────────────────────────────────────────────
  3:
    streak-3-xp:        { type: xp,       amount: 100 }
    streak-3-coins:     { type: currency, currency: coins, amount: 5000.0 }
    streak-3-crate:     { type: command,  command: 'ac virtualkey give {player} VoteCrate 1', asConsole: true }
    # Island flight time — granted via the JExOneblock flytime command (clamped to
    # the player's flytime cap). The recipient must be online when the streak fires.
    streak-3-flytime:   { type: command,  command: 'jexoneblock flytime {player} 45', asConsole: true }
    streak-3-hoppers:
      type: item
      material: HOPPER
      amount: 16
      name: "<gradient:#ffffff:#bdc3c7>Voter's Hoppers</gradient>"
      lore:
        - "<gray>Automate your one block."
    streak-3-diamonds:  { type: item, material: DIAMOND, amount: 6 }

  # ── Day 7 · Settler ─────────────────────────────────────────────
  7:
    streak-7-xp:        { type: xp,       amount: 250 }
    streak-7-coins:     { type: currency, currency: coins, amount: 15000.0 }
    streak-7-crate:     { type: command,  command: 'ac virtualkey give {player} SeasonCrate 1', asConsole: true }
    streak-7-pickaxe:
      type: item
      material: DIAMOND_PICKAXE
      amount: 1
      name: "<gradient:#55ff55:#16a34a>Voter's Pickaxe</gradient>"
      lore:
        - "<gray>Forged from a week of devotion."
      enchantments:
        efficiency: 4
        fortune: 2
        unbreaking: 3
      glow: true
    streak-7-diamonds:  { type: item, material: DIAMOND, amount: 16 }

  # ── Day 14 · Veteran ────────────────────────────────────────────
  14:
    streak-14-xp:       { type: xp,       amount: 500 }
    streak-14-coins:    { type: currency, currency: coins, amount: 50000.0 }
    streak-14-crate:    { type: command,  command: 'ac virtualkey give {player} VoteCrate 2', asConsole: true }
    streak-14-sword:
      type: item
      material: DIAMOND_SWORD
      amount: 1
      name: "<gradient:#5dade2:#2980b9>Voter's Blade</gradient>"
      lore:
        - "<gray>Loyalty sharpened to an edge."
      enchantments:
        sharpness: 5
        looting: 3
        unbreaking: 3
      glow: true
    streak-14-diamonds:  { type: item, material: DIAMOND, amount: 8 }
    streak-14-hoppers:   { type: item, material: HOPPER, amount: 32 }

  # ── Day 21 · Champion ───────────────────────────────────────────
  21:
    streak-21-xp:       { type: xp,       amount: 1000 }
    streak-21-coins:    { type: currency, currency: coins, amount: 75000.0 }
    streak-21-crate:    { type: command,  command: 'ac virtualkey give {player} VoidCrate 1', asConsole: true }
    streak-21-pickaxe:
      type: item
      material: DIAMOND_PICKAXE
      amount: 1
      name: "<gradient:#aa55ff:#6c3483>Champion's Drill</gradient>"
      lore:
        - "<gray>Carves through the void itself."
      enchantments:
        efficiency: 5
        fortune: 3
        unbreaking: 3
      glow: true
    streak-21-shulkers:  { type: item, material: SHULKER_BOX, amount: 2 }
    streak-21-void-key:  { type: command, command: 'ac virtualkey give {player} VoidCrate 1', asConsole: true }

  # ── Day 30 · Legend ─────────────────────────────────────────────
  30:
    streak-30-xp:       { type: xp,       amount: 2000 }
    streak-30-coins:    { type: currency, currency: coins, amount: 100000.0 }
    streak-30-crate:    { type: command,  command: 'ac virtualkey give {player} ShadowCrate 1', asConsole: true }
    # Strict no-OP: capstone is a cosmetic trophy + a season key, not beacon/netherite.
    streak-30-trophy:
      type: item
      material: DRAGON_HEAD
      amount: 1
      name: "<gradient:#ffd700:#e67e22>Streak Master's Trophy</gradient>"
      lore:
        - "<gray>30 days of unbroken devotion."
        - "<dark_gray>A monument to your loyalty."
      glow: true
    streak-30-season-key: { type: command, command: 'ac virtualkey give {player} SeasonCrate 1', asConsole: true }
    # Value shifted off coins (350k→100k) onto items per the "voting ≠ big money" call.
    streak-30-diamond-blocks: { type: item, material: DIAMOND_BLOCK, amount: 8 }

  # ── Day 60 · Eternal ────────────────────────────────────────────
  # Streak is uncapped, so the ladder continues past the day-30 capstone —
  # resources/currency/keys only, deliberately NO new gear (day 21 is the
  # top of the equipment chain; longer streaks reward the grind, not power).
  # dragon_crate is otherwise reserved for the rare jackpot/vote-party pull —
  # a 60-day unbroken streak is a rarer feat than either, so it earns the
  # first guaranteed exception.
  60:
    streak-60-xp:       { type: xp,       amount: 3000 }
    streak-60-coins:    { type: currency, currency: coins, amount: 80000.0 }
    streak-60-crate:    { type: command,  command: 'ac virtualkey give {player} DragonCrate 1', asConsole: true }
    streak-60-season-key: { type: command, command: 'ac virtualkey give {player} SeasonCrate 1', asConsole: true }
    streak-60-diamond-blocks: { type: item, material: DIAMOND_BLOCK, amount: 16 }

  # ── Day 90 · Immortal ───────────────────────────────────────────
  90:
    streak-90-xp:       { type: xp,       amount: 4000 }
    streak-90-coins:    { type: currency, currency: coins, amount: 100000.0 }
    streak-90-crate:    { type: command,  command: 'ac virtualkey give {player} DragonCrate 1', asConsole: true }
    streak-90-shadow-key: { type: command, command: 'ac virtualkey give {player} ShadowCrate 1', asConsole: true }
    streak-90-diamond-blocks: { type: item, material: DIAMOND_BLOCK, amount: 20 }
    # Vanilla-balanced safety item, not gear — no stat/damage/mining bonus.
    streak-90-totems:   { type: item, material: TOTEM_OF_UNDYING, amount: 2 }

  # ── Day 120 · Ascended ──────────────────────────────────────────
  120:
    streak-120-xp:      { type: xp,       amount: 5000 }
    streak-120-coins:   { type: currency, currency: coins, amount: 120000.0 }
    streak-120-crate:   { type: command,  command: 'ac virtualkey give {player} DragonCrate 1', asConsole: true }
    streak-120-void-key: { type: command, command: 'ac virtualkey give {player} VoidCrate 1', asConsole: true }
    streak-120-diamond-blocks: { type: item, material: DIAMOND_BLOCK, amount: 24 }

  # ── Day 180 · Devoted ───────────────────────────────────────────
  # Beacon is a cosmetic flex here — it grants no bonus by itself without a
  # player separately building the pyramid base; same non-OP spirit as the
  # existing rare 'party-beacon' pull in the vote-party pool.
  180:
    streak-180-xp:      { type: xp,       amount: 6000 }
    streak-180-coins:   { type: currency, currency: coins, amount: 150000.0 }
    streak-180-crate:   { type: command,  command: 'ac virtualkey give {player} DragonCrate 1', asConsole: true }
    streak-180-void-key: { type: command, command: 'ac virtualkey give {player} VoidCrate 1', asConsole: true }
    streak-180-shadow-key: { type: command, command: 'ac virtualkey give {player} ShadowCrate 1', asConsole: true }
    streak-180-diamond-blocks: { type: item, material: DIAMOND_BLOCK, amount: 32 }
    streak-180-beacon:  { type: item, material: BEACON, amount: 1 }

  # ── Day 365 · Undying ───────────────────────────────────────────
  # A full unbroken year of voting — the true ceiling of this ladder.
  365:
    streak-365-xp:      { type: xp,       amount: 10000 }
    streak-365-coins:   { type: currency, currency: coins, amount: 250000.0 }
    streak-365-crate:   { type: command,  command: 'ac virtualkey give {player} DragonCrate 1', asConsole: true }
    streak-365-void-key: { type: command, command: 'ac virtualkey give {player} VoidCrate 1', asConsole: true }
    streak-365-shadow-key: { type: command, command: 'ac virtualkey give {player} ShadowCrate 1', asConsole: true }
    streak-365-season-key: { type: command, command: 'ac virtualkey give {player} SeasonCrate 1', asConsole: true }
    streak-365-diamond-blocks: { type: item, material: DIAMOND_BLOCK, amount: 48 }
    # Cosmetic capstone, no stats — same "no-OP" rule as the day-30 trophy.
    streak-365-heart:
      type: item
      material: NETHER_STAR
      amount: 1
      name: "<gradient:#fde047:#e67e22>Undying Voter's Heart</gradient>"
      lore:
        - "<gray>365 days. Not one vote missed."
        - "<dark_gray>There is no higher tier than this."
      glow: true

# ── Site-Specific Rewards ───────────────────────────────────────
# Extra rewards for voting on specific sites.
# Use the site ID (from sites.yml) as the key.
site-rewards: {}
#  minecraft-server-list:
#    mcsl-bonus:
#      type: xp
#      amount: 25

# ── Vote Party Rewards (Premium) ────────────────────────────────
# Granted to EVERY player who contributed to a vote party when it
# completes (online players immediately, offline players on next
# login). Configure the target/toggle under 'vote-party' in config.yml.
# NOTE: Vote Party is a Premium-edition feature — on the Free edition it
# stays disabled regardless of these settings.
#
# Two parts:
#   vote-party-rewards : a small GUARANTEED baseline granted to everyone.
#   vote-party-pool    : a weighted rotation. Each contributor receives 3
#                        guaranteed draws plus decaying-chance extras
#                        (75% then −8%/step, hard cap 10 total). Online
#                        players see a slot-machine reveal animation first.
vote-party-rewards:
  # Guaranteed to EVERY contributor when a party completes. Parties fire often
  # (every 100 votes), so the flat coin grant is kept modest — a participation
  # thank-you, not the payout. The real prize is the weighted pool roll below.
  party-xp:    { type: xp,       amount: 200 }
  party-coins: { type: currency, currency: coins, amount: 2500.0 }

# Weighted party rotation. Redesigned 2026-07-10 (econ pass):
#   - virtual keys (ac virtualkey give), matching the server key model
#   - Season key REMOVED from the pool — a real-money-tier key, reserved for the
#     final rank + the shop; it must never fall out of a free party
#   - Dragon key kept but ultra-rare (grand prize)
#   - dropped the OP handouts (netherite block, beacon, diamond blocks)
#   - added PARTY-EXCLUSIVE tools (named/enchanted, no Mending) you can only get
#     from a vote party
#   - added BORDER-EXTENSION prizes — win island radius from a party
# Each entry has a stable 'id' so its drop-% + pull count surface in /vote party.
vote-party-pool:
  type: lucky
  entries:
    # -- Common — bulk materials & resources (keeps the economy fed) --
    - { weight: 6,   id: 'party-cobble',       reward: { type: item, material: COBBLESTONE,      amount: 256 } }
    - { weight: 5,   id: 'party-iron-block',   reward: { type: item, material: IRON_BLOCK,       amount: 4 } }
    - { weight: 4.5, id: 'party-gold-block',   reward: { type: item, material: GOLD_BLOCK,       amount: 4 } }
    - { weight: 4.5, id: 'party-coins-small',  reward: { type: currency, currency: coins, amount: 3000.0 } }
    - { weight: 4,   id: 'party-copper-block', reward: { type: item, material: COPPER_BLOCK,     amount: 16 } }
    - { weight: 4,   id: 'party-coal-block',   reward: { type: item, material: COAL_BLOCK,       amount: 16 } }
    - { weight: 4,   id: 'party-redstone',     reward: { type: item, material: REDSTONE_BLOCK,   amount: 8 } }
    - { weight: 4,   id: 'party-hoppers',      reward: { type: item, material: HOPPER,           amount: 16 } }
    - { weight: 4,   id: 'party-xp-bottles',   reward: { type: item, material: EXPERIENCE_BOTTLE, amount: 16 } }
    - { weight: 3.5, id: 'party-lapis-block',  reward: { type: item, material: LAPIS_BLOCK,      amount: 8 } }
    - { weight: 3.5, id: 'party-oak-logs',     reward: { type: item, material: OAK_LOG,          amount: 64 } }
    - { weight: 3,   id: 'party-glass',        reward: { type: item, material: GLASS,            amount: 64 } }
    - { weight: 3,   id: 'party-sand',         reward: { type: item, material: SAND,             amount: 128 } }
    - { weight: 3,   id: 'party-bonemeal',     reward: { type: item, material: BONE_MEAL,        amount: 32 } }
    - { weight: 3,   id: 'party-food',         reward: { type: item, material: COOKED_BEEF,      amount: 32 } }
    - { weight: 3,   id: 'party-obsidian',     reward: { type: item, material: OBSIDIAN,         amount: 16 } }
    - { weight: 2.5, id: 'party-rails',        reward: { type: item, material: RAIL,             amount: 32 } }
    - { weight: 2.5, id: 'party-torches',      reward: { type: item, material: TORCH,            amount: 64 } }
    # -- Uncommon — chase mats, QoL, cosmetics, a vote key --
    - { weight: 4,   id: 'party-vote-key',     announce: 'vote.lucky.jackpot', reward: { type: command, command: 'ac virtualkey give {player} VoteCrate 1', asConsole: true } }
    - { weight: 3.5, id: 'party-diamonds',     reward: { type: item, material: DIAMOND,          amount: 12 } }
    - { weight: 2.5, id: 'party-emerald',      reward: { type: item, material: EMERALD,          amount: 16 } }
    - { weight: 2.5, id: 'party-quartz',       reward: { type: item, material: QUARTZ,           amount: 64 } }
    - { weight: 2.5, id: 'party-ender-pearls', reward: { type: item, material: ENDER_PEARL,      amount: 8 } }
    - { weight: 2.5, id: 'party-coins-medium', reward: { type: currency, currency: coins, amount: 6000.0 } }
    - { weight: 2,   id: 'party-concrete',     reward: { type: item, material: WHITE_CONCRETE,   amount: 64 } }
    - { weight: 2,   id: 'party-amethyst',     reward: { type: item, material: AMETHYST_BLOCK,   amount: 16 } }
    - { weight: 2,   id: 'party-glowstone',    reward: { type: item, material: GLOWSTONE,        amount: 32 } }
    - { weight: 2,   id: 'party-xp-large',     reward: { type: item, material: EXPERIENCE_BOTTLE, amount: 32 } }
    - { weight: 2,   id: 'party-nametags',     reward: { type: item, material: NAME_TAG,         amount: 4 } }
    # -- Cosmetic flavour (no power) --
    - { weight: 1.5, id: 'party-fireworks',    reward: { type: item, material: FIREWORK_ROCKET,  amount: 32 } }
    - { weight: 1.5, id: 'party-disc',         reward: { type: item, material: MUSIC_DISC_BLOCKS, amount: 1 } }
    - { weight: 1.5, id: 'party-banner',       reward: { type: item, material: PURPLE_BANNER,    amount: 4 } }
    # -- Party-EXCLUSIVE tools (named + enchanted, no Mending — party-only) --
    - { weight: 1.5, id: 'party-pickaxe',      announce: 'vote.lucky.jackpot', reward: { type: item, material: DIAMOND_PICKAXE, amount: 1, glow: true, name: '<gradient:#a855f7:#6366f1>Party Pickaxe</gradient>', lore: ['<gray>Won from a Vote Party.', '<dark_gray>Efficiency IV, Unbreaking III'], enchantments: { efficiency: 4, unbreaking: 3 } } }
    - { weight: 1.5, id: 'party-blade',        announce: 'vote.lucky.jackpot', reward: { type: item, material: DIAMOND_SWORD, amount: 1, glow: true, name: '<gradient:#a855f7:#e74c3c>Party Blade</gradient>', lore: ['<gray>Won from a Vote Party.', '<dark_gray>Sharpness IV, Unbreaking III'], enchantments: { sharpness: 4, unbreaking: 3 } } }
    - { weight: 1.2, id: 'party-spade',        announce: 'vote.lucky.jackpot', reward: { type: item, material: DIAMOND_SHOVEL, amount: 1, glow: true, name: '<gradient:#a855f7:#0891b2>Party Spade</gradient>', lore: ['<gray>Won from a Vote Party.', '<dark_gray>Efficiency IV, Unbreaking III'], enchantments: { efficiency: 4, unbreaking: 3 } } }
    # -- Rare — netherite mats, larger coin, border extension --
    - { weight: 2,   id: 'party-netherite-scrap', reward: { type: item, material: NETHERITE_SCRAP, amount: 3 } }
    - { weight: 1.5, id: 'party-coins-large',  reward: { type: currency, currency: coins, amount: 12000.0 } }
    - { weight: 1.5, id: 'party-border-small', announce: 'vote.lucky.jackpot', reward: { type: command, command: 'jexoneblock grant-radius {player} 2', asConsole: true } }
    - { weight: 1,   id: 'party-netherite-ingot', reward: { type: item, material: NETHERITE_INGOT, amount: 1 } }
    # -- Epic — shadow key, bigger border win --
    - { weight: 1.2, id: 'party-shadow-key',   announce: 'vote.lucky.jackpot', reward: { type: command, command: 'ac virtualkey give {player} ShadowCrate 1', asConsole: true } }
    - { weight: 0.6, id: 'party-border-large', announce: 'vote.lucky.jackpot', reward: { type: command, command: 'jexoneblock grant-radius {player} 5', asConsole: true } }
    # -- Legendary — void & dragon keys (the grand prizes) --
    - { weight: 0.8, id: 'party-void-key',     announce: 'vote.lucky.jackpot', reward: { type: command, command: 'ac virtualkey give {player} VoidCrate 1', asConsole: true } }
    - { weight: 0.25, id: 'party-dragon-key',  announce: 'vote.lucky.jackpot', reward: { type: command, command: 'ac virtualkey give {player} DragonCrate 1', asConsole: true } }


# ── Vote Party Animation & Sound Configuration ───────────────────
# Customize the slot-machine reveal animation when a vote party completes.
# These settings control the visual and audio experience for online players.
vote-party:
  # Animation settings
  animation:
    # Number of spin frames before revealing rewards
    spin-frames: 14
    # Ticks between each spin frame (20 ticks = 1 second)
    frame-ticks: 3
    # Number of guaranteed pool draws per contributor
    guaranteed-picks: 3
    # Maximum total pool draws (guaranteed + extras)
    max-total-picks: 10
    # Starting chance for extra rolls (decays by extra-step each step)
    extra-start-chance: 0.75
    # Chance decay per extra roll step
    extra-step: 0.08

  # Sound settings
  sounds:
    # Sound played during spin animation
    spin: BLOCK_NOTE_BLOCK_HAT
    spin-volume: 0.7
    spin-pitch-base: 1.0
    spin-pitch-step: 0.1
    # Sound played on reveal
    reveal: UI_TOAST_CHALLENGE_COMPLETE
    reveal-volume: 1.0
    reveal-pitch: 1.0

  # Title settings (MiniMessage format)
  titles:
    # Title shown during spin animation
    spin: '<gradient:#fde047:#f59e0b>★ VOTE PARTY ★</gradient>'
    # Title shown on reveal
    reveal: '<gradient:#86efac:#16a34a>✦ REWARDS! ✦</gradient>'
    # Subtitle shown on reveal (supports {count} placeholder)
    reveal-subtitle: '<gray>You won <gradient:#fde047:#f59e0b>{count}</gradient> rewards!</gray>'
    # Title timing (milliseconds)
    fade-in: 0
    stay: 200
    fade-out: 0

