# ╔═══════════════════════════════════════════════════════════════╗
# ║                  JExVote — Reward Configuration              ║
# ╠═══════════════════════════════════════════════════════════════╣
# ║  Each reward needs a unique key and a 'type' field.          ║
# ║  Uses JExPlatform's universal reward system.                  ║
# ║                                                               ║
# ║  Available reward types:                                      ║
# ║    command, xp, currency, item, permission, sound, particle,  ║
# ║    teleport, title, composite, choice, custom,                ║
# ║    chance, lucky  (JExVote — Lucky Vote)                      ║
# ╚═══════════════════════════════════════════════════════════════╝

# ── Default Rewards ─────────────────────────────────────────────
# Granted every time a player votes, regardless of site or streak.
default-rewards:
  vote-xp:
    type: xp
    amount: 50
  vote-command:
    type: command
    command: 'give {player} diamond 1'
    as-console: true

# ── Streak Rewards ──────────────────────────────────────────────
# Bonus rewards when a player reaches a specific streak day.
# These are IN ADDITION to the default rewards.
streak-rewards:
  7:
    streak-7-bonus:
      type: command
      command: 'give {player} diamond 3'
      as-console: true
  14:
    streak-14-bonus:
      type: command
      command: 'give {player} diamond 5'
      as-console: true
  30:
    streak-30-bonus:
      type: command
      command: 'give {player} diamond_block 1'
      as-console: true
    streak-30-title:
      type: title
      title: '<gold><bold>30 Day Streak!'
      subtitle: '<gray>You are a dedicated voter!'
      fade-in: 10
      stay: 60
      fade-out: 10

# ── Site-Specific Rewards ───────────────────────────────────────
# Extra rewards for voting on specific sites.
# Use the site ID (from sites.yml) as the key.
site-rewards: {}
#  minecraft-server-list:
#    mcsl-bonus:
#      type: xp
#      amount: 25

# ── Vote Party Rewards (Premium) ────────────────────────────────
# Granted to EVERY player who contributed to a vote party when it
# completes (online players immediately, offline players on next
# login). Configure the target/toggle under 'vote-party' in config.yml.
vote-party-rewards: {}
