# JExCommand 2.0 tree for /vote (JExVote)
name: vote
description: "Open the vote menu or view vote sites"
aliases:
  - v
permission: "jexvote.command.vote"
senders: [player]

subcommands:
  - name: help
    description: "Show vote command help"
    senders: [player, console]

  - name: sites
    description: "List all vote sites"
    senders: [player, console]

  - name: stats
    description: "View your vote statistics"
    aliases:
      - info
    senders: [player, console]
    argumentSchema:
      - { name: player, type: offline_player, required: false, description: "Player to inspect" }

  - name: top
    description: "View the vote leaderboard"
    aliases:
      - leaderboard
      - lb
    senders: [player, console]
    argumentSchema:
      - { name: count, type: positive_long, required: false, defaultValue: "10", description: "Number of entries" }

  - name: rewards
    description: "View Lucky Vote rewards, weekend multiplier, vote party and drop stats"
    aliases:
      - economy
      - eco
    senders: [player, console]

  - name: freeze
    description: "Buy a Streak Freeze with vote points to protect your streak"
    aliases:
      - freezes
    senders: [player]

  - name: fly
    description: "Redeem vote points for temporary flight"
    senders: [player]

  - name: eventfly
    description: "Unlock permanent auto-flight during island events"
    aliases:
      - flyupgrade
    senders: [player]

  - name: gift
    description: "Gift today's streak advance to a player (or 'random')"
    senders: [player]
    argumentSchema:
      - { name: target, type: vote_gift_target, required: true, description: "Player name or 'random'" }
