# JExVote — Deutsche Übersetzungen

prefix: '<dark_gray>[<green>Vote<dark_gray>] '

_defaults:
  title: '<gray>Menü'
  back: '<gray>Zurück'

vote:
  broadcast: '<dark_gray>[<green>Vote<dark_gray>] <green>{player} <gray>hat auf <aqua>{service} <gray>gevotet!'
  received: '<green>Danke für deine Stimme auf <aqua>{service}<green>! Streak: <yellow>{streak}'
  pending_rewards: '<green>Du hast <yellow>{count} <green>ausstehende Vote-Belohnung(en)! Wird jetzt zugestellt...'
  no_permission: '<red>Dazu hast du keine Berechtigung.'
  player_not_found: '<red>Spieler nicht gefunden: <yellow>{player}'
  stats:
    header: '<gray>━━━━━━━━ <green>Vote-Statistiken <gray>━━━━━━━━'
    total: '<gray>Gesamt-Votes: <white>{total}'
    monthly: '<gray>Monatliche Votes: <white>{monthly}'
    streak: '<gray>Aktueller Streak: <green>{streak}'
    highest: '<gray>Höchster Streak: <yellow>{highest}'
    points: '<gray>Vote-Punkte: <aqua>{points}'
  leaderboard:
    header: '<gray>━━━━━━━━ <gold>Top-Voter <gray>━━━━━━━━'
    entry: '<gray>{rank}. <white>{player} <gray>— <green>{votes} Votes'
    empty: '<gray>Noch keine Votes aufgezeichnet.'
  reload: '<green>JExVote-Konfiguration neu geladen.'
  reset:
    success: '<green>Vote-Statistiken für <yellow>{player} <green>zurückgesetzt.'
    all_success: '<green>Monatliche Votes für alle Spieler zurückgesetzt.'
  sites:
    header: '<gray>━━━━━━ <green>Vote-Seiten <gray>━━━━━━'
    entry: '<green>{name} <gray>— <aqua>Klicke zum Voten'
    no_sites: '<gray>Keine Vote-Seiten konfiguriert.'

vote_overview:
  title: '<dark_gray>Vote-Übersicht'

vote_leaderboard:
  title: '<dark_gray>Vote-Rangliste'

vote_streak:
  title: '<dark_gray>Vote-Streaks'

  # ── Track-Ansicht ──
  header:
    name: '<gradient:#fca5a5:#dc2626><bold>🔥 Streak-Belohnungen</bold></gradient>'
    lore:
      - ''
      - '  <gray>Vote täglich, um deinen Streak aufzubauen!'
      - '  <gray>Erreiche Meilensteine für Bonusbelohnungen.'
      - ''

  your_streak:
    name: '<gradient:#fde047:#f59e0b><bold>🔥 Dein Streak</bold></gradient>'
    lore:
      - ''
      - '  <dark_gray>▸</dark_gray> <gray>Aktuell:</gray> <gradient:#86efac:#16a34a><bold>{current}</bold></gradient> <gray>{current_label}'
      - '  <dark_gray>▸</dark_gray> <gray>Höchster:</gray> <gradient:#fde047:#f59e0b><bold>{highest}</bold></gradient> <gray>{highest_label}'
      - ''
      - '  <gray>Vote täglich, um ihn zu halten!'
      - ''

  how_it_works:
    name: '<gradient:#86efac:#16a34a><bold>So funktioniert''s</bold></gradient>'
    lore:
      - ''
      - '  <gray>Vote jeden Tag, um deinen'
      - '  <gray>Streak aufzubauen. Erreiche'
      - '  <gray>Meilensteine für Bonusbelohnungen!'
      - ''
      - '  <gradient:#fca5a5:#dc2626>Ein verpasster Tag setzt'
      - '  <gradient:#fca5a5:#dc2626>deinen Streak zurück!'
      - ''

  progress:
    name: '<gradient:#a5f3fc:#06b6d4><bold>Fortschritt</bold></gradient>'
    lore:
      - ''
      - '  <gray>Nächster Meilenstein:</gray> <white>Tag {next}'
      - ''
      - '  {bar}'
      - '  <gradient:#86efac:#16a34a>{current}</gradient> <dark_gray>/</dark_gray> <white>{next}'
      - ''

  rewards_summary:
    name: '<gradient:#fde047:#f59e0b><bold>Belohnungen</bold></gradient>'

  loading: '  <gray>Laden...'
  day_label: 'Tag'
  days_label: 'Tage'
  rewards_header: '  <gradient:#d8b4fe:#9333ea>Belohnungen:'
  milestones_label: '  <gray>Meilensteine:</gray> <white>{count}'
  unlocked_label: '  <gray>Freigeschaltet:</gray> <gradient:#86efac:#16a34a>{count}'
  claimable_label: '  <gray>Abholbar:</gray> <gradient:#fde047:#f59e0b>{count}'
  remaining_label: '  <gray>Verbleibend:</gray> <gradient:#fca5a5:#dc2626>{count}'
  days_to_go: '  <dark_gray>Noch {remaining} {label}'

  # ── Meilenstein-Status ──
  milestone:
    name: '<bold>Tag {day}</bold>'
    claimed:
      status: '  <gradient:#86efac:#16a34a>✔ Abgeholt!</gradient>'
    claimable:
      status: '  <gradient:#fde047:#f59e0b>▶ Klicke zum Abholen!</gradient>'
    unlocked:
      status: '  <gradient:#86efac:#16a34a>✔ Freigeschaltet!</gradient>'
    next:
      status: '  <gradient:#fde047:#f59e0b>▶ Nächster Meilenstein!</gradient>'
    locked:
      status: '  <gradient:#fca5a5:#dc2626>✘ Gesperrt</gradient>'

  # ── Detail-Ansicht ──
  detail:
    header: '<bold>{status_gradient}Tag {day} — {status}</bold>'
    subtitle: '  <gray>Streak-Meilenstein-Belohnungen für Tag <white>{day}'
    reward_type: '  <gray>Typ: <white>{type}'
    back_button: '<gray>← Zurück zu Streaks'
    claim_button:
      name: '<gradient:#86efac:#16a34a><bold>✔ Belohnungen abholen</bold></gradient>'
      lore:
        - ''
        - '  <gray>Klicke, um deine'
        - '  <gray>Tag-{day}-Meilenstein-Belohnungen abzuholen!'
        - ''
    already_claimed:
      name: '<gradient:#86efac:#16a34a><bold>✔ Bereits abgeholt</bold></gradient>'
      lore:
        - ''
        - '  <gray>Du hast diese Belohnungen bereits abgeholt.'
        - ''
    locked_status:
      name: '<gradient:#fca5a5:#dc2626><bold>✘ Gesperrt</bold></gradient>'
      lore:
        - ''
        - '  <gray>Erreiche einen {day}-Tage-Streak zum Freischalten.'
        - '  <dark_gray>Noch {remaining} {label}'
        - ''

  # ── Abhol-Nachrichten ──
  claim:
    success: '<gradient:#86efac:#16a34a>✔</gradient> <green>Tag-{day}-Streak-Belohnungen abgeholt!'
    already_claimed: '<gradient:#fca5a5:#dc2626>✘</gradient> <red>Bereits abgeholt.'
    not_reached: '<gradient:#fca5a5:#dc2626>✘</gradient> <red>Du hast diesen Meilenstein noch nicht erreicht.'
    failed: '<gradient:#fca5a5:#dc2626>✘</gradient> <red>Abholen fehlgeschlagen. Bitte versuche es erneut.'

vote_shop:
  title: '<dark_gray>Vote-Shop'

# ── Built-in JExCommand keys ──────────────────────────────────────────────────

jexcommand:
  error:
    no-permission:        "<gradient:#fca5a5:#dc2626>✘</gradient> <red>Fehlende Berechtigung: <white>{permission}</white>."
    player-only:          "<gradient:#fca5a5:#dc2626>✘</gradient> <red>Dieser Befehl ist nur für Spieler."
    console-only:         "<gradient:#fca5a5:#dc2626>✘</gradient> <red>Dieser Befehl ist nur für die Konsole."
    invalid-argument:     "<gradient:#fca5a5:#dc2626>✘</gradient> <red>Ungültiges Argument <white>{value}</white> für <white>{name}</white>."
    missing-argument:     "<gradient:#fca5a5:#dc2626>✘</gradient> <red>Fehlendes Argument: <white>{name}</white>."
    too-many-arguments:   "<gradient:#fca5a5:#dc2626>✘</gradient> <red>Zu viele Argumente — unerwartet: <white>{value}</white>."
    invalid-long:         "<gradient:#fca5a5:#dc2626>✘</gradient> <red><white>{value}</white> ist keine ganze Zahl."
    invalid-double:       "<gradient:#fca5a5:#dc2626>✘</gradient> <red><white>{value}</white> ist keine Zahl."
    not-positive-long:    "<gradient:#fca5a5:#dc2626>✘</gradient> <red><white>{value}</white> muss positiv sein."
    not-positive-double:  "<gradient:#fca5a5:#dc2626>✘</gradient> <red><white>{value}</white> muss positiv sein."
    invalid-uuid:         "<gradient:#fca5a5:#dc2626>✘</gradient> <red><white>{value}</white> ist keine gültige UUID."
    invalid-enum:         "<gradient:#fca5a5:#dc2626>✘</gradient> <red><white>{value}</white> ist nicht eines von: <gray>{options}</gray>."
    expected-single-word: "<gradient:#fca5a5:#dc2626>✘</gradient> <red>Ein einzelnes Wort erwartet, erhalten: <white>{value}</white>."
    player-not-online:    "<gradient:#fca5a5:#dc2626>✘</gradient> <red>Spieler <white>{value}</white> ist nicht online."
    player-unknown:       "<gradient:#fca5a5:#dc2626>✘</gradient> <red>Unbekannter Spieler: <white>{value}</white>."
    internal:             "<gradient:#fca5a5:#dc2626>✘</gradient> <red>Interner Fehler: <white>{message}</white></red>"
  usage: "<gradient:#a5f3fc:#06b6d4>▸</gradient> <gray>Verwendung: <white>{usage}</white>"

command:
  vote:
    description: 'Öffne das Vote-Menü oder zeige Vote-Seiten'
  votes:
    description: 'Zeige deine Vote-Statistiken'
  votetop:
    description: 'Zeige die Vote-Rangliste'
  votereload:
    description: 'JExVote-Konfiguration neu laden'
  votereset:
    description: 'Vote-Statistiken eines Spielers zurücksetzen'
