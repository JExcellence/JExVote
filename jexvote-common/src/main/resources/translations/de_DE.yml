      - '  <gradient:#fca5a5:#dc2626>deinen Streak zurück!'
      - ''

  progress:
    name: '<gradient:#a5f3fc:#06b6d4><bold>Fortschritt</bold></gradient>'
    lore:
      - ''
      - '  <gray>Nächster Meilenstein:</gray> <white>Tag {next}'
      - ''
