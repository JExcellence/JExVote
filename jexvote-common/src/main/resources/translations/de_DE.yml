    entry: '  <dark_gray>▸</dark_gray> <gray>{reward}</gray>'

# ── Vote-Token Shop (VoteShopView) ────────────────────────────────────────────
vote_shop:
  title: '<gradient:#D8B4FE:#9333EA>Vote-Shop</gradient>'
  header:
    name: '<gradient:#D8B4FE:#9333EA><bold>✦ Vote-Tokens</bold></gradient>'
    lore:
      - ''
      - '<dark_gray>┃ <gray>Guthaben: <gradient:#D8B4FE:#9333EA>{points}</gradient> <gray>Punkte'
      - ''
      - '<dark_gray>┃ <gray>Punkte durch tägliches Voten sammeln.'
      - '<dark_gray>┃ <gray>Hier gegen Belohnungen eintauschen.'
      - ''

  tile:
    name: '<gradient:#D8B4FE:#9333EA><bold>{item}</bold></gradient>'
    lore:
      - ''
      - '<dark_gray>┃ <gray>Du erhältst:'
      - '<dark_gray>┕ {reward}'
      - ''
      - '<dark_gray>┃ <gray>Kosten: <gradient:#D8B4FE:#9333EA>{cost}</gradient> <gray>Punkte'
      - '<dark_gray>┃ <gray>Dein Guthaben: <#C084FC>{balance}'
      - ''
    footer-buy: '<dark_gray>┕ <gradient:#86EFAC:#22C55E>» Zum Kaufen klicken</gradient>'
    footer-need: '<dark_gray>┕ <gradient:#FCA5A5:#DC2626>» Noch {missing} Punkte fehlen</gradient>'

  empty:
    name: '<gradient:#A5F3FC:#06B6D4><bold>✦ Shop wird aufgefüllt</bold></gradient>'
    lore:
      - ''
      - '<dark_gray>┃ <gray>Gerade sind keine Artikel verfügbar.'
      - '<dark_gray>┃ <gray>Schau bald wieder vorbei!'
      - ''

  page-prev:
    name: '<gradient:#D8B4FE:#9333EA>« Vorherige Seite</gradient>'
    lore: '<dark_gray>┃ <gray>Seite <#C084FC>{page}<gray>/<#C084FC>{total}'
  page-next:
    name: '<gradient:#D8B4FE:#9333EA>Nächste Seite »</gradient>'
    lore: '<dark_gray>┃ <gray>Seite <#C084FC>{page}<gray>/<#C084FC>{total}'

  purchase:
    chat-header: '<dark_gray>━━━━ <gradient:#86EFAC:#22C55E:#16A34A><bold>✦ Vote-Shop-Kauf</bold></gradient> <dark_gray>━━━━'
    chat-item:    '<dark_gray>┃ <gray>Artikel: <gradient:#D8B4FE:#9333EA>{item}</gradient>'
    chat-reward:  '<dark_gray>┃ <gray>Belohnung: {reward}'
    chat-cost:    '<dark_gray>┃ <gray>Bezahlt: <gradient:#D8B4FE:#9333EA>{cost}</gradient> <gray>Punkte'
    chat-balance: '<dark_gray>┕ <gray>Guthaben: <#C084FC>{balance}<gray> Punkte'
    title:    '<gradient:#86EFAC:#22C55E:#16A34A><bold>✦ Gekauft!</bold></gradient>'
    subtitle: '<gradient:#D8B4FE:#9333EA>{item}</gradient>'

  not-enough: '<gradient:#FCA5A5:#DC2626>✘</gradient> <red>Dir fehlen <white>{missing}</white> Vote-Punkte dafür.</red>'
  no-profile: '<gradient:#FCA5A5:#DC2626>✘</gradient> <red>Vote zuerst mindestens einmal.</red>'
  error:      '<gradient:#FCA5A5:#DC2626>✘</gradient> <red>Kauf fehlgeschlagen. Versuche es erneut.</red>'
  players-only: '<gradient:#FCA5A5:#DC2626>✘</gradient> <red>Nur Spieler können den Vote-Shop nutzen.</red>'
  unavailable:  '<gradient:#FCA5A5:#DC2626>✘</gradient> <red>Der Vote-Shop ist gerade nicht verfügbar.</red>'

# ── Belohnungs-Label-Vorlagen (VoteRewardDescriber) ───────────────────────────
# Editierbare Label-Fragmente für Belohnungslisten (Lucky Vote, Streak-Kacheln,
# Vote-Party-Loot). {amount}/{material}/{unit}/{crate} werden im Code ersetzt;
# {material} ist ein Minecraft-Übersetzungsschlüssel, via <lang:…> pro Client.
reward_describe:
  item: '<gradient:#93c5fd:#2563eb>{amount}× <lang:{material}></gradient>'
  currency: '<gradient:#FFD700:#FFA500>◆ {amount} {unit}</gradient>'
  experience-points: '<gradient:#86efac:#16a34a>✦ {amount} XP</gradient>'
  experience-levels: '<gradient:#86efac:#16a34a>✦ {amount} Level</gradient>'
  crate-key: '<gradient:#a5f3fc:#06b6d4>{amount}× {crate}-Key</gradient>'
  special: '<gradient:#d8b4fe:#9333ea>✦ Spezial-Belohnung</gradient>'

# ── /vote help ──────────────────────────────────────────────────────────────
vote_help:
  banner: '<dark_gray>━━━━━━ <gradient:#86EFAC:#22C55E:#16A34A><bold>Vote-Befehle</bold></gradient> <dark_gray>━━━━━━'
  entry: '  <dark_gray>»</dark_gray> <gradient:#86EFAC:#22C55E>{command}</gradient> {args}<dark_gray> ┃ <gray>{description}</gray>'
  entry-args: '<dark_gray>⟨</dark_gray><white>{args}</white><dark_gray>⟩</dark_gray>'
  hover-base: '<gradient:#86EFAC:#22C55E:#16A34A><bold>{full}</bold></gradient><newline><gray>{description}</gray>'
  hover-aliases: '<dark_gray>Aliasse: </dark_gray><gray>{aliases}</gray>'
  hover-action-run: '<dark_gray>»</dark_gray> <gradient:#86EFAC:#22C55E>Zum Ausführen klicken</gradient>'
  hover-action-suggest: '<dark_gray>»</dark_gray> <gradient:#86EFAC:#22C55E>Zum Vervollständigen klicken</gradient>'

# ── /jexvote help (admin) ────────────────────────────────────────────────────
vote_admin:
  banner: '<dark_gray>━━━━ <gradient:#FCA5A5:#DC2626><bold>JExVote Admin</bold></gradient> <dark_gray>┃</dark_gray> <gradient:#FBBF24:#F59E0B><bold>[ADMIN]</bold></gradient> <dark_gray>━━━━'
  entry: '  <dark_gray>»</dark_gray> <gradient:#FCA5A5:#DC2626>{command}</gradient> {args}<dark_gray> ┃ <gray>{description}</gray>'
  entry-args: '<dark_gray>⟨</dark_gray><white>{args}</white><dark_gray>⟩</dark_gray>'
  hover-base: '<gradient:#FCA5A5:#DC2626><bold>{full}</bold></gradient> <gradient:#FBBF24:#F59E0B>[ADMIN]</gradient><newline><gray>{description}</gray>'
  hover-aliases: '<dark_gray>Aliasse: </dark_gray><gray>{aliases}</gray>'
  hover-action-run: '<dark_gray>»</dark_gray> <gradient:#FCA5A5:#DC2626>Zum Ausführen klicken</gradient>'
  hover-action-suggest: '<dark_gray>»</dark_gray> <gradient:#FCA5A5:#DC2626>Zum Vervollständigen klicken</gradient>'

# ── Built-in JExCommand keys ──────────────────────────────────────────────────

jexcommand:
  error:
    no-permission:        "<gradient:#fca5a5:#dc2626>✘</gradient> <red>Fehlende Berechtigung: <white>{permission}</white>."
    player-only:          "<gradient:#fca5a5:#dc2626>✘</gradient> <red>Dieser Befehl ist nur für Spieler."
    console-only:         "<gradient:#fca5a5:#dc2626>✘</gradient> <red>Dieser Befehl ist nur für die Konsole."
    invalid-argument:     "<gradient:#fca5a5:#dc2626>✘</gradient> <red>Ungültiges Argument <white>{value}</white> für <white>{name}</white>."
    missing-argument:     "<gradient:#fca5a5:#dc2626>✘</gradient> <red>Fehlendes Argument: <white>{name}</white>."
    too-many-arguments:   "<gradient:#fca5a5:#dc2626>✘</gradient> <red>Zu viele Argumente — unerwartet: <white>{value}</white>."
    invalid-long:         "<gradient:#fca5a5:#dc2626>✘</gradient> <red><white>{value}</white> ist keine ganze Zahl."
    invalid-double:       "<gradient:#fca5a5:#dc2626>✘</gradient> <red><white>{value}</white> ist keine Zahl."
    not-positive-long:    "<gradient:#fca5a5:#dc2626>✘</gradient> <red><white>{value}</white> muss positiv sein."
    not-positive-double:  "<gradient:#fca5a5:#dc2626>✘</gradient> <red><white>{value}</white> muss positiv sein."
    invalid-uuid:         "<gradient:#fca5a5:#dc2626>✘</gradient> <red><white>{value}</white> ist keine gültige UUID."
    invalid-enum:         "<gradient:#fca5a5:#dc2626>✘</gradient> <red><white>{value}</white> ist nicht eines von: <gray>{options}</gray>."
    expected-single-word: "<gradient:#fca5a5:#dc2626>✘</gradient> <red>Ein einzelnes Wort erwartet, erhalten: <white>{value}</white>."
    player-not-online:    "<gradient:#fca5a5:#dc2626>✘</gradient> <red>Spieler <white>{value}</white> ist nicht online."
    player-unknown:       "<gradient:#fca5a5:#dc2626>✘</gradient> <red>Unbekannter Spieler: <white>{value}</white>."
    internal:             "<gradient:#fca5a5:#dc2626>✘</gradient> <red>Interner Fehler: <white>{message}</white></red>"
  usage: "<gradient:#a5f3fc:#06b6d4>▸</gradient> <gray>Verwendung: <white>{usage}</white>"

command:
  vote:
    description: 'Öffne das Vote-Menü oder zeige Vote-Seiten'
  votes:
    description: 'Zeige deine Vote-Statistiken'
  votetop:
    description: 'Zeige die Vote-Rangliste'
  votereload:
    description: 'JExVote-Konfiguration neu laden'
  votereset:
    description: 'Vote-Statistiken eines Spielers zurücksetzen'
