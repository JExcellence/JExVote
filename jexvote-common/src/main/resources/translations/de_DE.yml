    name: 'Tag {day}'
    claimed:
      status: '  <gradient:#86efac:#16a34a>✔ Abgeholt!</gradient>'
    claimable:
      status: '  <gradient:#fde047:#f59e0b>▶ Klicke zum Abholen!</gradient>'
    unlocked:
      status: '  <gradient:#86efac:#16a34a>✔ Freigeschaltet!</gradient>'
    next:
      status: '  <gradient:#fde047:#f59e0b>▶ Nächster Meilenstein!</gradient>'
    locked:
      status: '  <gradient:#fca5a5:#dc2626>✘ Gesperrt</gradient>'

  # ── Detail-Ansicht ──
