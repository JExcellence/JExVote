    received: '<gradient:#86efac:#16a34a>✦ Geschenk!</gradient> <gradient:#86efac:#16a34a>{gifter}</gradient> <gray>hat deine Vote-Serie am Leben gehalten! Serie:</gray> <gradient:#fde047:#f59e0b>{streak}</gradient>'
