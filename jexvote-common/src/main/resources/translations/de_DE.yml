# JExVote — Deutsche Übersetzungen

prefix: '<dark_gray>[<green>Vote<dark_gray>] '

_defaults:
  title: '<gray>Menü'
  back: '<gray>Zurück'

vote:
  broadcast: '<dark_gray>[<green>Vote<dark_gray>] <green>{player} <gray>hat auf <aqua>{service} <gray>gevotet!'
  received: '<green>Danke für deine Stimme auf <aqua>{service}<green>! Streak: <yellow>{streak}'
  pending_rewards: '<green>Du hast <yellow>{count} <green>ausstehende Vote-Belohnung(en)! Wird jetzt zugestellt...'
  lucky:
    hit: '<gradient:#fde047:#f59e0b>★ Lucky Vote!</gradient> <gray>Du hast eine Bonus-Belohnung gewonnen!</gray> <yellow>{chance}</yellow>'
  freeze:
    saved: '<gradient:#a5f3fc:#06b6d4>❄ Streak-Freeze!</gradient> <gray>Deine Serie wurde gerettet</gray> <dark_gray>(</dark_gray><white>{consumed} verbraucht</white><dark_gray>,</dark_gray> <white>{remaining} übrig</white><dark_gray>)</dark_gray><gray>. Serie:</gray> <gradient:#fde047:#f59e0b>{streak}</gradient>'
    bought: '<gradient:#a5f3fc:#06b6d4>❄</gradient> <gray>Streak-Freeze gekauft für</gray> <gradient:#d8b4fe:#9333ea>{cost} Punkte</gradient><gray>.</gray>'
    disabled: '<gradient:#fca5a5:#dc2626>✘</gradient> <red>Streak-Freezes sind auf diesem Server deaktiviert.</red>'
    at_max: '<gradient:#fca5a5:#dc2626>✘</gradient> <red>Du besitzt bereits das Maximum von</red> <white>{max}</white> <red>Streak-Freeze(s).</red>'
    not_enough: '<gradient:#fca5a5:#dc2626>✘</gradient> <red>Du brauchst</red> <gradient:#d8b4fe:#9333ea>{cost} Vote-Punkte</gradient><red>, um einen Streak-Freeze zu kaufen.</red>'
    no_profile: '<gradient:#fca5a5:#dc2626>✘</gradient> <red>Vote mindestens einmal, bevor du einen Streak-Freeze kaufst.</red>'
    error: '<gradient:#fca5a5:#dc2626>✘</gradient> <red>Kauf konnte nicht abgeschlossen werden. Versuche es erneut.</red>'
  gift:
    usage: '<dark_gray>▸</dark_gray> <gray>Verwendung:</gray> <gradient:#86efac:#16a34a>/vote gift <white><Spieler|random></white></gradient>'
    sent: '<gradient:#86efac:#16a34a>✔</gradient> <gray>Du hast</gray> <gradient:#86efac:#16a34a>{target}</gradient> <gray>einen Serien-Fortschritt geschenkt! Serie:</gray> <gradient:#fde047:#f59e0b>{streak}</gradient> <dark_gray>(</dark_gray><white>{remaining} Geschenk(e) heute übrig</white><dark_gray>)</dark_gray>'
    received: '<gradient:#86efac:#16a34a>✦ Geschenk!</gradient> <gradient:#86efac:#16a34a>{gifter}</gradient> <gray>hat deine Vote-Serie am Leben gehalten! Serie:</gray> <gradient:#fde047:#f59e0b>{streak}</gradient>'
    disabled: '<gradient:#fca5a5:#dc2626>✘</gradient> <red>Vote-Geschenke sind auf diesem Server deaktiviert.</red>'
    gifter_no_profile: '<gradient:#fca5a5:#dc2626>✘</gradient> <red>Vote mindestens einmal, bevor du verschenkst.</red>'
    not_voted: '<gradient:#fca5a5:#dc2626>✘</gradient> <red>Du musst heute voten, bevor du verschenken kannst.</red>'
    limit: '<gradient:#fca5a5:#dc2626>✘</gradient> <red>Du hast heute schon alle Geschenke verbraucht.</red>'
    self: '<gradient:#fca5a5:#dc2626>✘</gradient> <red>Du kannst dir nicht selbst etwas schenken.</red>'
    target_not_found: '<gradient:#fca5a5:#dc2626>✘</gradient> <red>Kein Vote-Profil gefunden für</red> <white>{target}</white><red>.</red>'
    already_advanced: '<gradient:#fde047:#f59e0b>ⓘ</gradient> <gray><white>{target}</white> hat seine Serie heute bereits erhöht.</gray>'
    no_random: '<gradient:#fca5a5:#dc2626>✘</gradient> <red>Keine anderen Spieler online zum Verschenken.</red>'
    error: '<gradient:#fca5a5:#dc2626>✘</gradient> <red>Geschenk konnte nicht abgeschlossen werden. Versuche es erneut.</red>'
  party:
    progress: '<gray>Vote-Party:</gray> <green>{current}</green><gray>/</gray><white>{target}</white>'
    reached: '<dark_gray>[<gradient:#86efac:#16a34a>Vote</gradient><dark_gray>]</dark_gray> <gradient:#fde047:#f59e0b>★ Vote-Party #{party} abgeschlossen!</gradient> <gray>Alle Beitragenden wurden belohnt!</gray>'
  no_permission: '<red>Dazu hast du keine Berechtigung.'
  player_not_found: '<red>Spieler nicht gefunden: <yellow>{player}'
  stats:
    header: '<gray>━━━━━━━━ <green>Vote-Statistiken <gray>━━━━━━━━'
    total: '<gray>Gesamt-Votes: <white>{total}'
    monthly: '<gray>Monatliche Votes: <white>{monthly}'
    streak: '<gray>Aktueller Streak: <green>{streak}'
    highest: '<gray>Höchster Streak: <yellow>{highest}'
    points: '<gray>Vote-Punkte: <aqua>{points}'
  leaderboard:
    header: '<gray>━━━━━━━━ <gold>Top-Voter <gray>━━━━━━━━'
    entry: '<gray>{rank}. <white>{player} <gray>— <green>{votes} Votes'
    empty: '<gray>Noch keine Votes aufgezeichnet.'
  reload: '<green>JExVote-Konfiguration neu geladen.'
  reset:
    success: '<green>Vote-Statistiken für <yellow>{player} <green>zurückgesetzt.'
    all_success: '<green>Monatliche Votes für alle Spieler zurückgesetzt.'
  sites:
    header: '<gray>━━━━━━ <green>Vote-Seiten <gray>━━━━━━'
    entry: '<green>{name} <gray>— <aqua>Klicke zum Voten'
    no_sites: '<gray>Keine Vote-Seiten konfiguriert.'

vote_overview:
  title: '<dark_gray>Vote-Übersicht'

vote_leaderboard:
  title: '<dark_gray>Vote-Rangliste'

vote_streak:
  title: '<dark_gray>Vote-Streaks'

  # ── Track-Ansicht ──
  header:
    name: '<gradient:#fca5a5:#dc2626><bold>🔥 Streak-Belohnungen</bold></gradient>'
    lore:
      - ''
      - '  <gray>Vote täglich, um deinen Streak aufzubauen!'
      - '  <gray>Erreiche Meilensteine für Bonusbelohnungen.'
      - ''

  your_streak:
    name: '<gradient:#fde047:#f59e0b><bold>🔥 Dein Streak</bold></gradient>'
    lore:
      - ''
      - '  <dark_gray>▸</dark_gray> <gray>Aktuell:</gray> <gradient:#86efac:#16a34a><bold>{current}</bold></gradient> <gray>{current_label}'
      - '  <dark_gray>▸</dark_gray> <gray>Höchster:</gray> <gradient:#fde047:#f59e0b><bold>{highest}</bold></gradient> <gray>{highest_label}'
      - ''
      - '  <gray>Vote täglich, um ihn zu halten!'
      - ''

  how_it_works:
    name: '<gradient:#86efac:#16a34a><bold>So funktioniert''s</bold></gradient>'
    lore:
      - ''
      - '  <gray>Vote jeden Tag, um deinen'
      - '  <gray>Streak aufzubauen. Erreiche'
      - '  <gray>Meilensteine für Bonusbelohnungen!'
      - ''
      - '  <gradient:#fca5a5:#dc2626>Ein verpasster Tag setzt'
      - '  <gradient:#fca5a5:#dc2626>deinen Streak zurück!'
      - ''

  progress:
    name: '<gradient:#a5f3fc:#06b6d4><bold>Fortschritt</bold></gradient>'
    lore:
      - ''
      - '  <gray>Nächster Meilenstein:</gray> <white>Tag {next}'
      - ''
      - '  {bar}'
      - '  <gradient:#86efac:#16a34a>{current}</gradient> <dark_gray>/</dark_gray> <white>{next}'
      - ''

  rewards_summary:
    name: '<gradient:#fde047:#f59e0b><bold>Belohnungen</bold></gradient>'

  loading: '  <gray>Laden...'
  day_label: 'Tag'
  days_label: 'Tage'
  rewards_header: '  <gradient:#d8b4fe:#9333ea>Belohnungen:'
  milestones_label: '  <gray>Meilensteine:</gray> <white>{count}'
  unlocked_label: '  <gray>Freigeschaltet:</gray> <gradient:#86efac:#16a34a>{count}'
  claimable_label: '  <gray>Abholbar:</gray> <gradient:#fde047:#f59e0b>{count}'
  remaining_label: '  <gray>Verbleibend:</gray> <gradient:#fca5a5:#dc2626>{count}'
  days_to_go: '  <dark_gray>Noch {remaining} {label}'

  # ── Meilenstein-Status ──
  milestone:
    name: '<bold>Tag {day}</bold>'
    claimed:
      status: '  <gradient:#86efac:#16a34a>✔ Abgeholt!</gradient>'
    claimable:
      status: '  <gradient:#fde047:#f59e0b>▶ Klicke zum Abholen!</gradient>'
    unlocked:
      status: '  <gradient:#86efac:#16a34a>✔ Freigeschaltet!</gradient>'
    next:
      status: '  <gradient:#fde047:#f59e0b>▶ Nächster Meilenstein!</gradient>'
    locked:
      status: '  <gradient:#fca5a5:#dc2626>✘ Gesperrt</gradient>'

  # ── Detail-Ansicht ──
  detail:
    header: '<bold>{status_gradient}Tag {day} — {status}</bold>'
    subtitle: '  <gray>Streak-Meilenstein-Belohnungen für Tag <white>{day}'
    reward_type: '  <gray>Typ: <white>{type}'
    back_button: '<gray>← Zurück zu Streaks'
    claim_button:
      name: '<gradient:#86efac:#16a34a><bold>✔ Belohnungen abholen</bold></gradient>'
      lore:
        - ''
        - '  <gray>Klicke, um deine'
        - '  <gray>Tag-{day}-Meilenstein-Belohnungen abzuholen!'
        - ''
    already_claimed:
      name: '<gradient:#86efac:#16a34a><bold>✔ Bereits abgeholt</bold></gradient>'
      lore:
        - ''
        - '  <gray>Du hast diese Belohnungen bereits abgeholt.'
        - ''
    locked_status:
      name: '<gradient:#fca5a5:#dc2626><bold>✘ Gesperrt</bold></gradient>'
      lore:
        - ''
        - '  <gray>Erreiche einen {day}-Tage-Streak zum Freischalten.'
        - '  <dark_gray>Noch {remaining} {label}'
        - ''

  # ── Abhol-Nachrichten ──
  claim:
    success: '<gradient:#86efac:#16a34a>✔</gradient> <green>Tag-{day}-Streak-Belohnungen abgeholt!'
    already_claimed: '<gradient:#fca5a5:#dc2626>✘</gradient> <red>Bereits abgeholt.'
    not_reached: '<gradient:#fca5a5:#dc2626>✘</gradient> <red>Du hast diesen Meilenstein noch nicht erreicht.'
    failed: '<gradient:#fca5a5:#dc2626>✘</gradient> <red>Abholen fehlgeschlagen. Bitte versuche es erneut.'

vote_shop:
  title: '<dark_gray>Vote-Shop'

vote_rewards:
  title: '<dark_gray>Vote-Economy'
  header:
    name: '<gradient:#fde047:#f59e0b><bold>✦ Vote-Economy</bold></gradient>'
    lore:
      - ''
      - '  <gray>Lucky Vote, Wochenend-Multiplikator,'
      - '  <gray>Vote-Party & Belohnungs-Drop-Statistik.'
      - ''
  lucky:
    name: '<gradient:#fde047:#f59e0b><bold>★ Lucky Vote</bold></gradient>'
    empty: '  <gray>Keine Lucky-Belohnungen konfiguriert.'
    entry: '  <dark_gray>▸</dark_gray> <gray>{reward}</gray> <yellow>{chance}%</yellow>  <dark_gray>({won}× gewonnen)</dark_gray>'
    pool: '  <dark_gray>▸</dark_gray> <gradient:#fde047:#f59e0b>Jackpot-Pool</gradient> <dark_gray>({count} Ergebnisse)</dark_gray>'
    pool-entry: '     <dark_gray>•</dark_gray> <gray>{reward}</gray> <yellow>{chance}%</yellow>  <dark_gray>({won}×)</dark_gray>'
  multiplier:
    name: '<gradient:#fde047:#f59e0b><bold>⚡ Wochenend-Multiplikator</bold></gradient>'
    status-active: '  <dark_gray>▸</dark_gray> <gray>Status:</gray> <gradient:#86efac:#16a34a>AKTIV</gradient>'
    status-inactive: '  <dark_gray>▸</dark_gray> <gray>Status:</gray> <dark_gray>inaktiv</dark_gray>'
    current: '  <dark_gray>▸</dark_gray> <gray>Aktuell:</gray> <yellow>{factor}×</yellow>'
    weekend: '  <dark_gray>▸</dark_gray> <gray>Wochenend-Faktor:</gray> <yellow>{factor}×</yellow>'
    days: '  <dark_gray>▸</dark_gray> <gray>Tage:</gray> <white>{days}</white>'
  party:
    name: '<gradient:#fde047:#f59e0b><bold>✦ Vote-Party</bold></gradient>'
    disabled: '  <dark_gray>Vote-Partys sind deaktiviert.'
    progress: '  <dark_gray>▸</dark_gray> <gray>Fortschritt:</gray> <gradient:#86efac:#16a34a>{current}</gradient><dark_gray>/</dark_gray><white>{target}</white>'
    remaining: '  <dark_gray>▸</dark_gray> <gray>Verbleibend:</gray> <white>{remaining}</white>'
    rewards-header: '  <gray>Bei Abschluss erhältst du:'
    reward-entry: '  <dark_gray>▸</dark_gray> <gray>{reward}</gray>'
    none: '  <dark_gray>Keine Party-Belohnungen konfiguriert.'
  freeze:
    name: '<gradient:#a5f3fc:#06b6d4><bold>❄ Streak-Freeze</bold></gradient>'
    disabled: '  <dark_gray>Streak-Freezes sind deaktiviert.'
    how: '  <gray>Schützt deine Serie, wenn du einen Vote verpasst.'
    owned: '  <dark_gray>▸</dark_gray> <gray>Besessen:</gray> <gradient:#a5f3fc:#06b6d4>{owned}</gradient><dark_gray>/</dark_gray><white>{max}</white>'
    cost: '  <dark_gray>▸</dark_gray> <gray>Kosten:</gray> <gradient:#d8b4fe:#9333ea>{cost} Punkte</gradient>'
    duration: '  <dark_gray>▸</dark_gray> <gray>Deckt ab:</gray> <white>{duration}h pro Freeze</white>'
    buy-hint: '  <gradient:#86efac:#16a34a>Zum Kaufen klicken</gradient> <dark_gray>(oder /vote freeze)</dark_gray>'
  gift:
    name: '<gradient:#86efac:#16a34a><bold>✦ Vote-Geschenk</bold></gradient>'
    disabled: '  <dark_gray>Vote-Geschenke sind deaktiviert.'
    how: '  <gray>Halte die Serie eines Freundes am Leben.'
    limit: '  <dark_gray>▸</dark_gray> <gray>Geschenke heute übrig:</gray> <gradient:#86efac:#16a34a>{remaining}</gradient><dark_gray>/</dark_gray><white>{limit}</white>'
    require-vote: '  <dark_gray>▸</dark_gray> <gray>Voraussetzung:</gray> <white>heute gevotet</white>'
    usage: '  <gray>Nutze</gray> <gradient:#86efac:#16a34a>/vote gift <Spieler|random></gradient>'
  text:
    header: '<dark_gray>━━━━ <gradient:#fde047:#f59e0b><bold>Vote-Economy</bold></gradient> <dark_gray>━━━━'
    lucky-entry: '<dark_gray>▸</dark_gray> <gray>{reward}</gray> <yellow>{chance}%</yellow> <dark_gray>({won}× gewonnen)</dark_gray>'
    multiplier: '<dark_gray>▸</dark_gray> <gray>Multiplikator:</gray> <yellow>{factor}×</yellow> <dark_gray>({status})</dark_gray>'
    party: '<dark_gray>▸</dark_gray> <gray>Vote-Party:</gray> <green>{current}</green><dark_gray>/</dark_gray><white>{target}</white> <dark_gray>(noch {remaining})</dark_gray>'

# ── Built-in JExCommand keys ──────────────────────────────────────────────────

jexcommand:
  error:
    no-permission:        "<gradient:#fca5a5:#dc2626>✘</gradient> <red>Fehlende Berechtigung: <white>{permission}</white>."
    player-only:          "<gradient:#fca5a5:#dc2626>✘</gradient> <red>Dieser Befehl ist nur für Spieler."
    console-only:         "<gradient:#fca5a5:#dc2626>✘</gradient> <red>Dieser Befehl ist nur für die Konsole."
    invalid-argument:     "<gradient:#fca5a5:#dc2626>✘</gradient> <red>Ungültiges Argument <white>{value}</white> für <white>{name}</white>."
    missing-argument:     "<gradient:#fca5a5:#dc2626>✘</gradient> <red>Fehlendes Argument: <white>{name}</white>."
    too-many-arguments:   "<gradient:#fca5a5:#dc2626>✘</gradient> <red>Zu viele Argumente — unerwartet: <white>{value}</white>."
    invalid-long:         "<gradient:#fca5a5:#dc2626>✘</gradient> <red><white>{value}</white> ist keine ganze Zahl."
    invalid-double:       "<gradient:#fca5a5:#dc2626>✘</gradient> <red><white>{value}</white> ist keine Zahl."
    not-positive-long:    "<gradient:#fca5a5:#dc2626>✘</gradient> <red><white>{value}</white> muss positiv sein."
    not-positive-double:  "<gradient:#fca5a5:#dc2626>✘</gradient> <red><white>{value}</white> muss positiv sein."
    invalid-uuid:         "<gradient:#fca5a5:#dc2626>✘</gradient> <red><white>{value}</white> ist keine gültige UUID."
    invalid-enum:         "<gradient:#fca5a5:#dc2626>✘</gradient> <red><white>{value}</white> ist nicht eines von: <gray>{options}</gray>."
    expected-single-word: "<gradient:#fca5a5:#dc2626>✘</gradient> <red>Ein einzelnes Wort erwartet, erhalten: <white>{value}</white>."
    player-not-online:    "<gradient:#fca5a5:#dc2626>✘</gradient> <red>Spieler <white>{value}</white> ist nicht online."
    player-unknown:       "<gradient:#fca5a5:#dc2626>✘</gradient> <red>Unbekannter Spieler: <white>{value}</white>."
    internal:             "<gradient:#fca5a5:#dc2626>✘</gradient> <red>Interner Fehler: <white>{message}</white></red>"
  usage: "<gradient:#a5f3fc:#06b6d4>▸</gradient> <gray>Verwendung: <white>{usage}</white>"

command:
  vote:
    description: 'Öffne das Vote-Menü oder zeige Vote-Seiten'
  votes:
    description: 'Zeige deine Vote-Statistiken'
  votetop:
    description: 'Zeige die Vote-Rangliste'
  votereload:
    description: 'JExVote-Konfiguration neu laden'
  votereset:
    description: 'Vote-Statistiken eines Spielers zurücksetzen'
