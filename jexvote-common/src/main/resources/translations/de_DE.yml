      name: '<gradient:#86efac:#16a34a><bold>✔ Belohnungen abholen</bold></gradient>'
      lore:
        - ''
        - '  <gray>Klicke, um deine'
        - '  <gray>Tag-{day}-Meilenstein-Belohnungen abzuholen!'
        - ''
    already_claimed:
      name: '<gradient:#86efac:#16a34a><bold>✔ Bereits abgeholt</bold></gradient>'
      lore:
        - ''
        - '  <gray>Du hast diese Belohnungen bereits abgeholt.'
        - ''
    locked_status:
      name: '<gradient:#fca5a5:#dc2626><bold>✘ Gesperrt</bold></gradient>'
      lore:
        - ''
        - '  <gray>Erreiche einen {day}-Tage-Streak zum Freischalten.'
        - '  <dark_gray>Noch {remaining} {label}'
        - ''

  # ── Abhol-Nachrichten ──
  claim:
    success: '<gradient:#86efac:#16a34a>✔</gradient> <green>Tag-{day}-Streak-Belohnungen abgeholt!'
    already_claimed: '<gradient:#fca5a5:#dc2626>✘</gradient> <red>Bereits abgeholt.'
    not_reached: '<gradient:#fca5a5:#dc2626>✘</gradient> <red>Du hast diesen Meilenstein noch nicht erreicht.'
    failed: '<gradient:#fca5a5:#dc2626>✘</gradient> <red>Abholen fehlgeschlagen. Bitte versuche es erneut.'

