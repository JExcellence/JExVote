  reload: '<green>JExVote-Konfiguration neu geladen.'
  reset:
    success: '<green>Vote-Statistiken für <yellow>{player} <green>zurückgesetzt.'
    all_success: '<green>Monatliche Votes für alle Spieler zurückgesetzt.'
  sites:
