# JExVote — English translations

prefix: '<dark_gray>[<green>Vote<dark_gray>] '

_defaults:
  title: '<gray>Menu'
  back: '<gray>Back'

vote:
   broadcast: '<dark_gray>[<green>Vote<dark_gray>] <green>{player} <gray>voted on <aqua>{service}<gray>!'
   received: '<green>Thank you for voting on <aqua>{service}<green>! Streak: <yellow>{streak}'
   pending_rewards: '<green>You have <yellow>{count} <green>pending vote reward(s)! Delivering now...'
   shop:
     players_only: '<gradient:#fca5a5:#dc2626>✘</gradient> <red>Only players can open the vote shop.</red>'
     unavailable: '<gradient:#fca5a5:#dc2626>✘</gradient> <red>The vote shop is not available on this server.</red>'
  lucky:
    hit: '<gradient:#fde047:#f59e0b>★ Lucky Vote!</gradient> <gray>You won a bonus reward!</gray> <yellow>{chance}</yellow>'
    jackpot: '<gradient:#fde047:#f59e0b>★ Vote Jackpot!</gradient> <gray>Fortune smiles on you — check your rewards!</gray>'
  freeze:
    granted: '<gradient:#a5f3fc:#06b6d4>❄ Welcome gift!</gradient> <gray>You received</gray> <white>{amount}</white> <gray>free Streak Freeze(s) — they auto-protect your streak if you miss a day. Buy more with</gray> <gradient:#86efac:#16a34a>/vote freeze</gradient><gray>.</gray>'
    saved: '<gradient:#a5f3fc:#06b6d4>❄ Streak Freeze!</gradient> <gray>Your streak was saved</gray> <dark_gray>(</dark_gray><white>used {consumed}</white><dark_gray>,</dark_gray> <white>{remaining} left</white><dark_gray>)</dark_gray><gray>. Streak:</gray> <gradient:#fde047:#f59e0b>{streak}</gradient>'
    bought: '<gradient:#a5f3fc:#06b6d4>❄</gradient> <gray>Streak Freeze purchased for</gray> <gradient:#d8b4fe:#9333ea>{cost} points</gradient><gray>.</gray>'
    disabled: '<gradient:#fca5a5:#dc2626>✘</gradient> <red>Streak Freezes are disabled on this server.</red>'
    at_max: '<gradient:#fca5a5:#dc2626>✘</gradient> <red>You already own the maximum of</red> <white>{max}</white> <red>Streak Freeze(s).</red>'
    not_enough: '<gradient:#fca5a5:#dc2626>✘</gradient> <red>You need</red> <gradient:#d8b4fe:#9333ea>{cost} vote points</gradient> <red>to buy a Streak Freeze.</red>'
    no_profile: '<gradient:#fca5a5:#dc2626>✘</gradient> <red>Vote at least once before buying a Streak Freeze.</red>'
    error: '<gradient:#fca5a5:#dc2626>✘</gradient> <red>Could not complete the purchase. Try again.</red>'
  fly:
    granted: '<gradient:#7dd3fc:#2563eb>✈ Flight granted!</gradient> <gray>You can fly for</gray> <white>{minutes} min</white> <gray>— cost</gray> <gradient:#d8b4fe:#9333ea>{cost} vote points</gradient><gray>.</gray>'
    disabled: '<gradient:#fca5a5:#dc2626>✘</gradient> <red>Flight redemption is disabled on this server.</red>'
    not_enough: '<gradient:#fca5a5:#dc2626>✘</gradient> <red>You need</red> <gradient:#d8b4fe:#9333ea>{cost} vote points</gradient> <red>to redeem flight.</red>'
    no_profile: '<gradient:#fca5a5:#dc2626>✘</gradient> <red>Vote at least once before redeeming flight.</red>'
    unavailable: '<gradient:#fca5a5:#dc2626>✘</gradient> <red>Flight is unavailable right now (JExEssentials missing?).</red>'
    error: '<gradient:#fca5a5:#dc2626>✘</gradient> <red>Could not redeem flight. Try again.</red>'
  eventfly:
    granted: '<gradient:#7dd3fc:#2563eb>✈ Event auto-fly unlocked!</gradient> <gray>You now fly automatically while any island event is active — cost</gray> <gradient:#d8b4fe:#9333ea>{cost} vote points</gradient><gray>.</gray>'
    already_owned: '<gradient:#fde047:#f59e0b>✦</gradient> <yellow>You already own the event auto-fly perk.</yellow>'
    not_enough: '<gradient:#fca5a5:#dc2626>✘</gradient> <red>You need</red> <gradient:#d8b4fe:#9333ea>{cost} vote points</gradient> <red>to unlock event auto-fly.</red>'
  gift:
    usage: '<dark_gray>▸</dark_gray> <gray>Usage:</gray> <gradient:#86efac:#16a34a>/vote gift <white><player|random></white></gradient>'
    sent: '<gradient:#86efac:#16a34a>✔</gradient> <gray>You gifted a streak advance to</gray> <gradient:#86efac:#16a34a>{target}</gradient><gray>! Their streak:</gray> <gradient:#fde047:#f59e0b>{streak}</gradient> <dark_gray>(</dark_gray><white>{remaining} gift(s) left today</white><dark_gray>)</dark_gray>'
    received: '<gradient:#86efac:#16a34a>✦ Gift!</gradient> <gradient:#86efac:#16a34a>{gifter}</gradient> <gray>kept your vote streak alive! Streak:</gray> <gradient:#fde047:#f59e0b>{streak}</gradient>'
    disabled: '<gradient:#fca5a5:#dc2626>✘</gradient> <red>Vote gifting is disabled on this server.</red>'
    gifter_no_profile: '<gradient:#fca5a5:#dc2626>✘</gradient> <red>Vote at least once before gifting.</red>'
    not_voted: '<gradient:#fca5a5:#dc2626>✘</gradient> <red>You must vote today before you can gift.</red>'
    limit: '<gradient:#fca5a5:#dc2626>✘</gradient> <red>You have used all your gifts for today.</red>'
    self: '<gradient:#fca5a5:#dc2626>✘</gradient> <red>You cannot gift to yourself.</red>'
    target_not_found: '<gradient:#fca5a5:#dc2626>✘</gradient> <red>No vote profile found for</red> <white>{target}</white><red>.</red>'
    already_advanced: '<gradient:#fde047:#f59e0b>ⓘ</gradient> <gray><white>{target}</white> already advanced their streak today.</gray>'
    no_random: '<gradient:#fca5a5:#dc2626>✘</gradient> <red>No other players are online to gift to.</red>'
    error: '<gradient:#fca5a5:#dc2626>✘</gradient> <red>Could not complete the gift. Try again.</red>'
  party:
    progress: '<gray>Vote Party:</gray> <green>{current}</green><gray>/</gray><white>{target}</white>'
    reached: '<dark_gray>[<gradient:#86efac:#16a34a>Vote</gradient><dark_gray>]</dark_gray> <gradient:#fde047:#f59e0b>★ Vote Party #{party} complete!</gradient> <gray>All contributors have been rewarded!</gray>'
  no_permission: '<red>You do not have permission to do this.'
  player_not_found: '<red>Player not found: <yellow>{player}'
  stats:
    header: '<gray>━━━━━━━━ <green>Vote Stats <gray>━━━━━━━━'
    total: '<gray>Total Votes: <white>{total}'
    monthly: '<gray>Monthly Votes: <white>{monthly}'
    streak: '<gray>Current Streak: <green>{streak}'
    highest: '<gray>Highest Streak: <yellow>{highest}'
    points: '<gray>Vote Points: <aqua>{points}'
  leaderboard:
    header: '<gray>━━━━━━━━ <gold>Top Voters <gray>━━━━━━━━'
    entry: '<gray>{rank}. <white>{player} <gray>— <green>{votes} votes'
    empty: '<gray>No votes recorded yet.'
  reload: '<green>JExVote configuration reloaded.'
  reset:
    success: '<green>Reset vote stats for <yellow>{player}<green>.'
    all_success: '<green>Reset monthly votes for all players.'
  sites:
    header: '<gray>━━━━━━ <green>Vote Sites <gray>━━━━━━'
    entry: '<green>{name} <gray>— <aqua>Click to vote'
    no_sites: '<gray>No vote sites configured.'

vote_overview:
  title: '<dark_gray>Vote Overview'

vote_leaderboard:
  title: '<dark_gray>Vote Leaderboard'

vote_streak:
  title: '<dark_gray>Vote Streaks'

  # ── Track view ──
  header:
    name: '<gradient:#fca5a5:#dc2626><bold>🔥 Streak Rewards</bold></gradient>'
    lore:
      - ''
      - '  <gray>Vote daily to build your streak!'
      - '  <gray>Reach milestones for bonus rewards.'
      - ''

  your_streak:
    name: '<gradient:#fde047:#f59e0b><bold>🔥 Your Streak</bold></gradient>'
    lore:
      - ''
      - '  <dark_gray>▸</dark_gray> <gray>Current:</gray> <gradient:#86efac:#16a34a><bold>{current}</bold></gradient> <gray>{current_label}'
      - '  <dark_gray>▸</dark_gray> <gray>Highest:</gray> <gradient:#fde047:#f59e0b><bold>{highest}</bold></gradient> <gray>{highest_label}'
      - ''
      - '  <gray>Vote daily to keep it going!'
      - ''

  how_it_works:
    name: '<gradient:#86efac:#16a34a><bold>How It Works</bold></gradient>'
    lore:
      - ''
      - '  <gray>Vote every day to build'
      - '  <gray>your streak. Reach milestones'
      - '  <gray>to earn bonus rewards!'
      - ''
      - '  <gradient:#fca5a5:#dc2626>Missing a day resets'
      - '  <gradient:#fca5a5:#dc2626>your streak!'
      - ''

  progress:
    name: '<gradient:#a5f3fc:#06b6d4><bold>Progress</bold></gradient>'
    lore:
      - ''
      - '  <gray>Next milestone:</gray> <white>Day {next}'
      - ''
      - '  {bar}'
      - '  <gradient:#86efac:#16a34a>{current}</gradient> <dark_gray>/</dark_gray> <white>{next}'
      - ''

  rewards_summary:
    name: '<gradient:#fde047:#f59e0b><bold>Rewards</bold></gradient>'

  loading: '  <gray>Loading...'
  day_label: 'day'
  days_label: 'days'
  rewards_header: '  <gradient:#d8b4fe:#9333ea>Rewards:'
  milestones_label: '  <gray>Milestones:</gray> <white>{count}'
  unlocked_label: '  <gray>Unlocked:</gray> <gradient:#86efac:#16a34a>{count}'
  claimable_label: '  <gray>Claimable:</gray> <gradient:#fde047:#f59e0b>{count}'
  remaining_label: '  <gray>Remaining:</gray> <gradient:#fca5a5:#dc2626>{count}'
  days_to_go: '  <dark_gray>{remaining} {label} to go'

  # ── Milestone states ──
  milestone:
    name: '<bold>Day {day}</bold>'
    claimed:
      status: '  <gradient:#86efac:#16a34a>✔ Claimed!</gradient>'
    claimable:
      status: '  <gradient:#fde047:#f59e0b>▶ Click to claim!</gradient>'
    unlocked:
      status: '  <gradient:#86efac:#16a34a>✔ Unlocked!</gradient>'
    next:
      status: '  <gradient:#fde047:#f59e0b>▶ Next milestone!</gradient>'
    locked:
      status: '  <gradient:#fca5a5:#dc2626>✘ Locked</gradient>'

  # ── Detail view ──
  detail:
    header: '<bold>{status_gradient}Day {day} — {status}</bold>'
    subtitle: '  <gray>Streak milestone rewards for day <white>{day}'
    reward_type: '  <gray>Type: <white>{type}'
    back_button: '<gray>← Back to Streaks'
    claim_button:
      name: '<gradient:#86efac:#16a34a><bold>✔ Claim Rewards</bold></gradient>'
      lore:
        - ''
        - '  <gray>Click to claim your'
        - '  <gray>Day {day} milestone rewards!'
        - ''
    already_claimed:
      name: '<gradient:#86efac:#16a34a><bold>✔ Already Claimed</bold></gradient>'
      lore:
        - ''
        - '  <gray>You already collected these rewards.'
        - ''
    locked_status:
      name: '<gradient:#fca5a5:#dc2626><bold>✘ Locked</bold></gradient>'
      lore:
        - ''
        - '  <gray>Reach a {day}-day streak to unlock.'
        - '  <dark_gray>{remaining} {label} to go'
        - ''

  # ── Claim result messages ──
  claim:
    success: '<gradient:#86efac:#16a34a>✔</gradient> <green>Claimed Day {day} streak rewards!'
    already_claimed: '<gradient:#fca5a5:#dc2626>✘</gradient> <red>Already claimed.'
    not_reached: '<gradient:#fca5a5:#dc2626>✘</gradient> <red>You haven''t reached this milestone yet.'
    failed: '<gradient:#fca5a5:#dc2626>✘</gradient> <red>Failed to claim rewards. Please try again.'

