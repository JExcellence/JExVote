  # Placeholders: {points}
  header:
    name: '<gradient:#D8B4FE:#9333EA><bold>✦ Vote Tokens</bold></gradient>'
    lore:
      - ''
      - '<dark_gray>┃ <gray>Balance: <gradient:#D8B4FE:#9333EA>{points}</gradient> <gray>points'
      - ''
      - '<dark_gray>┃ <gray>Earn points by voting daily.'
      - '<dark_gray>┃ <gray>Spend them on the rewards below.'
      - ''

  # ── Shop tile — one per listing ─────────────────────────────────────────
  # Placeholders: {item} {reward} {cost} {balance} {missing}
  # The {reward} placeholder is rendered by VoteRewardDescriber, so it carries
  # full styling for items (with translatable names), commands ("Dragon Crate
  # Key"), currency, XP, etc.
  tile:
    name: '<gradient:#D8B4FE:#9333EA><bold>{item}</bold></gradient>'
    lore:
      - ''
      - '<dark_gray>┃ <gray>You get:'
      - '<dark_gray>┕ {reward}'
      - ''
      - '<dark_gray>┃ <gray>Cost: <gradient:#D8B4FE:#9333EA>{cost}</gradient> <gray>points'
      - '<dark_gray>┃ <gray>Your balance: <#C084FC>{balance}'
      - ''
    # Footer appended depending on affordability.
    footer-buy: '<dark_gray>┕ <gradient:#86EFAC:#22C55E>» Click to buy</gradient>'
    footer-need: '<dark_gray>┕ <gradient:#FCA5A5:#DC2626>» Need {missing} more points</gradient>'

  # ── Empty-shop placeholder ───────────────────────────────────────────────
  # Shown when no items are configured. Door, not barrier — see V-00 design.
  empty:
    name: '<gradient:#A5F3FC:#06B6D4><bold>✦ Shop being restocked</bold></gradient>'
    lore:
      - ''
      - '<dark_gray>┃ <gray>No items are listed right now.'
      - '<dark_gray>┃ <gray>Check back soon!'
      - ''

  # ── Pagination ──────────────────────────────────────────────────────────
  # Placeholders: {page} {total}
  page-prev:
    name: '<gradient:#D8B4FE:#9333EA>« Previous page</gradient>'
    lore: '<dark_gray>┃ <gray>Page <#C084FC>{page}<gray>/<#C084FC>{total}'
  page-next:
    name: '<gradient:#D8B4FE:#9333EA>Next page »</gradient>'
    lore: '<dark_gray>┃ <gray>Page <#C084FC>{page}<gray>/<#C084FC>{total}'

  # ── Purchase feedback (chat receipt + title) ────────────────────────────
  # Placeholders: {item} {reward} {cost} {balance}
  purchase:
    chat-header: '<dark_gray>━━━━ <gradient:#86EFAC:#22C55E:#16A34A><bold>✦ Vote Shop Purchase</bold></gradient> <dark_gray>━━━━'
    chat-item:    '<dark_gray>┃ <gray>Item: <gradient:#D8B4FE:#9333EA>{item}</gradient>'
    chat-reward:  '<dark_gray>┃ <gray>Reward: {reward}'
    chat-cost:    '<dark_gray>┃ <gray>Paid: <gradient:#D8B4FE:#9333EA>{cost}</gradient> <gray>points'
    chat-balance: '<dark_gray>┕ <gray>Balance: <#C084FC>{balance}<gray> points'
    title:    '<gradient:#86EFAC:#22C55E:#16A34A><bold>✦ Purchased!</bold></gradient>'
    subtitle: '<gradient:#D8B4FE:#9333EA>{item}</gradient>'

  # ── Error toasts ────────────────────────────────────────────────────────
  not-enough: '<gradient:#FCA5A5:#DC2626>✘</gradient> <red>You need <white>{missing}</white> more vote points for that.</red>'
  no-profile: '<gradient:#FCA5A5:#DC2626>✘</gradient> <red>Vote at least once first.</red>'
  error:      '<gradient:#FCA5A5:#DC2626>✘</gradient> <red>Purchase failed. Try again.</red>'
  players-only: '<gradient:#FCA5A5:#DC2626>✘</gradient> <red>Only players can use the Vote Shop.</red>'
  unavailable:  '<gradient:#FCA5A5:#DC2626>✘</gradient> <red>The Vote Shop is unavailable right now.</red>'

# ── Reward label templates (VoteRewardDescriber) ──────────────────────────────
# Editable label fragments embedded into reward lists (lucky vote, streak tiles,
# vote-party loot). {amount}/{material}/{unit}/{crate} are substituted in code;
# {material} is a Minecraft translation key rendered via <lang:…> per client.
reward_describe:
  item: '<gradient:#93c5fd:#2563eb>{amount}× <lang:{material}></gradient>'
  currency: '<gradient:#FFD700:#FFA500>◆ {amount} {unit}</gradient>'
  experience-points: '<gradient:#86efac:#16a34a>✦ {amount} XP</gradient>'
  experience-levels: '<gradient:#86efac:#16a34a>✦ {amount} levels</gradient>'
  crate-key: '<gradient:#a5f3fc:#06b6d4>{amount}× {crate} Key</gradient>'
  special: '<gradient:#d8b4fe:#9333ea>✦ Special Reward</gradient>'

# ── /vote help ──────────────────────────────────────────────────────────────
# Rendered by HelpRenderer. Placeholders:
#   banner             : (none)
#   entry              : {command}, {args}, {description}  ({args} can be empty)
#   entry-args         : {args}                            (the raw signature)
#   hover-base         : {full}, {description}
#   hover-aliases      : {aliases}
#   hover-action-*     : (none)
vote_help:
  banner: '<dark_gray>━━━━━━ <gradient:#86EFAC:#22C55E:#16A34A><bold>Vote Commands</bold></gradient> <dark_gray>━━━━━━'
  entry: '  <dark_gray>»</dark_gray> <gradient:#86EFAC:#22C55E>{command}</gradient> {args}<dark_gray> ┃ <gray>{description}</gray>'
  entry-args: '<dark_gray>⟨</dark_gray><white>{args}</white><dark_gray>⟩</dark_gray>'
  hover-base: '<gradient:#86EFAC:#22C55E:#16A34A><bold>{full}</bold></gradient><newline><gray>{description}</gray>'
  hover-aliases: '<dark_gray>Aliases: </dark_gray><gray>{aliases}</gray>'
  hover-action-run: '<dark_gray>»</dark_gray> <gradient:#86EFAC:#22C55E>Click to run</gradient>'
  hover-action-suggest: '<dark_gray>»</dark_gray> <gradient:#86EFAC:#22C55E>Click to fill</gradient>'

# ── /jexvote help (admin) ────────────────────────────────────────────────────
# Same shape as vote_help; deliberate red gradient + [ADMIN] badge so the two
# helps don't look near-identical (the previous green vs red was too subtle).
vote_admin:
  banner: '<dark_gray>━━━━ <gradient:#FCA5A5:#DC2626><bold>JExVote Admin</bold></gradient> <dark_gray>┃</dark_gray> <gradient:#FBBF24:#F59E0B><bold>[ADMIN]</bold></gradient> <dark_gray>━━━━'
  entry: '  <dark_gray>»</dark_gray> <gradient:#FCA5A5:#DC2626>{command}</gradient> {args}<dark_gray> ┃ <gray>{description}</gray>'
  entry-args: '<dark_gray>⟨</dark_gray><white>{args}</white><dark_gray>⟩</dark_gray>'
  hover-base: '<gradient:#FCA5A5:#DC2626><bold>{full}</bold></gradient> <gradient:#FBBF24:#F59E0B>[ADMIN]</gradient><newline><gray>{description}</gray>'
  hover-aliases: '<dark_gray>Aliases: </dark_gray><gray>{aliases}</gray>'
  hover-action-run: '<dark_gray>»</dark_gray> <gradient:#FCA5A5:#DC2626>Click to run</gradient>'
  hover-action-suggest: '<dark_gray>»</dark_gray> <gradient:#FCA5A5:#DC2626>Click to fill</gradient>'

# ── Built-in JExCommand keys ──────────────────────────────────────────────────

jexcommand:
  error:
    no-permission:        "<gradient:#fca5a5:#dc2626>✘</gradient> <red>Missing permission <white>{permission}</white>."
    player-only:          "<gradient:#fca5a5:#dc2626>✘</gradient> <red>This command is player-only."
    console-only:         "<gradient:#fca5a5:#dc2626>✘</gradient> <red>This command is console-only."
    invalid-argument:     "<gradient:#fca5a5:#dc2626>✘</gradient> <red>Invalid argument <white>{value}</white> for <white>{name}</white>."
    missing-argument:     "<gradient:#fca5a5:#dc2626>✘</gradient> <red>Missing argument <white>{name}</white>."
    too-many-arguments:   "<gradient:#fca5a5:#dc2626>✘</gradient> <red>Too many arguments — unexpected <white>{value}</white>."
    invalid-long:         "<gradient:#fca5a5:#dc2626>✘</gradient> <red><white>{value}</white> is not a whole number."
    invalid-double:       "<gradient:#fca5a5:#dc2626>✘</gradient> <red><white>{value}</white> is not a number."
    not-positive-long:    "<gradient:#fca5a5:#dc2626>✘</gradient> <red><white>{value}</white> must be positive."
    not-positive-double:  "<gradient:#fca5a5:#dc2626>✘</gradient> <red><white>{value}</white> must be positive."
    invalid-uuid:         "<gradient:#fca5a5:#dc2626>✘</gradient> <red><white>{value}</white> is not a valid UUID."
    invalid-enum:         "<gradient:#fca5a5:#dc2626>✘</gradient> <red><white>{value}</white> is not one of: <gray>{options}</gray>."
    expected-single-word: "<gradient:#fca5a5:#dc2626>✘</gradient> <red>Expected a single word, got <white>{value}</white>."
    player-not-online:    "<gradient:#fca5a5:#dc2626>✘</gradient> <red>Player <white>{value}</white> is not online."
    player-unknown:       "<gradient:#fca5a5:#dc2626>✘</gradient> <red>Unknown player <white>{value}</white>."
    internal:             "<gradient:#fca5a5:#dc2626>✘</gradient> <red>Internal error: <white>{message}</white></red>"
  usage: "<gradient:#a5f3fc:#06b6d4>▸</gradient> <gray>Usage: <white>{usage}</white>"

command:
  vote:
    description: 'Open the vote menu or view vote sites'
  votes:
    description: 'View your vote statistics'
  votetop:
    description: 'View the vote leaderboard'
  votereload:
    description: 'Reload JExVote configuration'
  votereset:
    description: 'Reset a player''s vote statistics'
