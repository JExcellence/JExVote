# JExVote — České překlady

prefix: '<dark_gray>[<green>Vote<dark_gray>] '

_defaults:
  title: '<gray>Menu'
  back: '<gray>Zpět'

vote:
  broadcast: '<dark_gray>[<green>Vote<dark_gray>] <green>{player} <gray>hlasoval na <aqua>{service}<gray>!'
  received: '<green>Děkujeme za hlasování na <aqua>{service}<green>! Série: <yellow>{streak}'
  pending_rewards: '<green>Máte <yellow>{count} <green>čekající odměnu/y za hlasování! Doručuji...'
  no_permission: '<red>Na toto nemáte oprávnění.'
  player_not_found: '<red>Hráč nenalezen: <yellow>{player}'
  stats:
    header: '<gray>━━━━━━━━ <green>Statistiky hlasování <gray>━━━━━━━━'
    total: '<gray>Celkem hlasů: <white>{total}'
    monthly: '<gray>Měsíční hlasy: <white>{monthly}'
    streak: '<gray>Aktuální série: <green>{streak}'
    highest: '<gray>Nejvyšší série: <yellow>{highest}'
    points: '<gray>Body za hlasování: <aqua>{points}'
  leaderboard:
    header: '<gray>━━━━━━━━ <gold>Top hlasující <gray>━━━━━━━━'
    entry: '<gray>{rank}. <white>{player} <gray>— <green>{votes} hlasů'
    empty: '<gray>Zatím žádné hlasy.'
  reload: '<green>Konfigurace JExVote znovu načtena.'
  reset:
    success: '<green>Statistiky hlasování pro <yellow>{player} <green>resetovány.'
    all_success: '<green>Měsíční hlasy pro všechny hráče resetovány.'
  sites:
    header: '<gray>━━━━━━ <green>Hlasovací stránky <gray>━━━━━━'
    entry: '<green>{name} <gray>— <aqua>Klikni pro hlasování'
    no_sites: '<gray>Žádné hlasovací stránky nakonfigurovány.'

vote_overview:
  title: '<dark_gray>Přehled hlasování'

vote_leaderboard:
  title: '<dark_gray>Žebříček hlasování'

vote_streak:
  title: '<dark_gray>Série hlasování'

  # ── Zobrazení dráhy ──
  header:
    name: '<gradient:#fca5a5:#dc2626><bold>🔥 Odměny za sérii</bold></gradient>'
    lore:
      - ''
      - '  <gray>Hlasuj denně a buduj svou sérii!'
      - '  <gray>Dosáhni milníků pro bonusové odměny.'
      - ''

  your_streak:
    name: '<gradient:#fde047:#f59e0b><bold>🔥 Tvoje série</bold></gradient>'
    lore:
      - ''
      - '  <dark_gray>▸</dark_gray> <gray>Aktuální:</gray> <gradient:#86efac:#16a34a><bold>{current}</bold></gradient> <gray>{current_label}'
      - '  <dark_gray>▸</dark_gray> <gray>Nejvyšší:</gray> <gradient:#fde047:#f59e0b><bold>{highest}</bold></gradient> <gray>{highest_label}'
      - ''
      - '  <gray>Hlasuj denně, ať série pokračuje!'
      - ''

  how_it_works:
    name: '<gradient:#86efac:#16a34a><bold>Jak to funguje</bold></gradient>'
    lore:
      - ''
      - '  <gray>Hlasuj každý den a buduj'
      - '  <gray>svou sérii. Dosáhni milníků'
      - '  <gray>pro bonusové odměny!'
      - ''
      - '  <gradient:#fca5a5:#dc2626>Vynechaný den resetuje'
      - '  <gradient:#fca5a5:#dc2626>tvou sérii!'
      - ''

  progress:
    name: '<gradient:#a5f3fc:#06b6d4><bold>Postup</bold></gradient>'
    lore:
      - ''
      - '  <gray>Další milník:</gray> <white>Den {next}'
      - ''
      - '  {bar}'
      - '  <gradient:#86efac:#16a34a>{current}</gradient> <dark_gray>/</dark_gray> <white>{next}'
      - ''

  rewards_summary:
    name: '<gradient:#fde047:#f59e0b><bold>Odměny</bold></gradient>'

  loading: '  <gray>Načítání...'
  day_label: 'den'
  days_label: 'dní'
  rewards_header: '  <gradient:#d8b4fe:#9333ea>Odměny:'
  milestones_label: '  <gray>Milníky:</gray> <white>{count}'
  unlocked_label: '  <gray>Odemčeno:</gray> <gradient:#86efac:#16a34a>{count}'
  claimable_label: '  <gray>K vyzvednutí:</gray> <gradient:#fde047:#f59e0b>{count}'
  remaining_label: '  <gray>Zbývá:</gray> <gradient:#fca5a5:#dc2626>{count}'
  days_to_go: '  <dark_gray>Zbývá {remaining} {label}'

  # ── Stavy milníků ──
  milestone:
    name: '<bold>Den {day}</bold>'
    claimed:
      status: '  <gradient:#86efac:#16a34a>✔ Vyzvednuto!</gradient>'
    claimable:
      status: '  <gradient:#fde047:#f59e0b>▶ Klikni pro vyzvednutí!</gradient>'
    unlocked:
      status: '  <gradient:#86efac:#16a34a>✔ Odemčeno!</gradient>'
    next:
      status: '  <gradient:#fde047:#f59e0b>▶ Další milník!</gradient>'
    locked:
      status: '  <gradient:#fca5a5:#dc2626>✘ Zamčeno</gradient>'

  # ── Detailní zobrazení ──
  detail:
    header: '<bold>{status_gradient}Den {day} — {status}</bold>'
    subtitle: '  <gray>Odměny za milník série pro den <white>{day}'
    reward_type: '  <gray>Typ: <white>{type}'
    back_button: '<gray>← Zpět na série'
    claim_button:
      name: '<gradient:#86efac:#16a34a><bold>✔ Vyzvednout odměny</bold></gradient>'
      lore:
        - ''
        - '  <gray>Klikni pro vyzvednutí'
        - '  <gray>odměn za milník dne {day}!'
        - ''
    already_claimed:
      name: '<gradient:#86efac:#16a34a><bold>✔ Již vyzvednuto</bold></gradient>'
      lore:
        - ''
        - '  <gray>Tyto odměny jsi již vyzvedl.'
        - ''
    locked_status:
      name: '<gradient:#fca5a5:#dc2626><bold>✘ Zamčeno</bold></gradient>'
      lore:
        - ''
        - '  <gray>Dosáhni {day}denní série k odemčení.'
        - '  <dark_gray>Zbývá {remaining} {label}'
        - ''

  # ── Zprávy o vyzvednutí ──
  claim:
    success: '<gradient:#86efac:#16a34a>✔</gradient> <green>Odměny za sérii dne {day} vyzvednuty!'
    already_claimed: '<gradient:#fca5a5:#dc2626>✘</gradient> <red>Již vyzvednuto.'
    not_reached: '<gradient:#fca5a5:#dc2626>✘</gradient> <red>Tohoto milníku jsi ještě nedosáhl.'
    failed: '<gradient:#fca5a5:#dc2626>✘</gradient> <red>Vyzvednutí selhalo. Zkus to prosím znovu.'

vote_shop:
  title: '<dark_gray>Obchod za hlasy'

# ── Built-in JExCommand keys ──────────────────────────────────────────────────

jexcommand:
  error:
    no-permission:        "<gradient:#fca5a5:#dc2626>✘</gradient> <red>Chybějící oprávnění: <white>{permission}</white>."
    player-only:          "<gradient:#fca5a5:#dc2626>✘</gradient> <red>Tento příkaz je pouze pro hráče."
    console-only:         "<gradient:#fca5a5:#dc2626>✘</gradient> <red>Tento příkaz je pouze pro konzoli."
    invalid-argument:     "<gradient:#fca5a5:#dc2626>✘</gradient> <red>Neplatný argument <white>{value}</white> pro <white>{name}</white>."
    missing-argument:     "<gradient:#fca5a5:#dc2626>✘</gradient> <red>Chybějící argument: <white>{name}</white>."
    too-many-arguments:   "<gradient:#fca5a5:#dc2626>✘</gradient> <red>Příliš mnoho argumentů — neočekávaný: <white>{value}</white>."
    invalid-long:         "<gradient:#fca5a5:#dc2626>✘</gradient> <red><white>{value}</white> není celé číslo."
    invalid-double:       "<gradient:#fca5a5:#dc2626>✘</gradient> <red><white>{value}</white> není číslo."
    not-positive-long:    "<gradient:#fca5a5:#dc2626>✘</gradient> <red><white>{value}</white> musí být kladné."
    not-positive-double:  "<gradient:#fca5a5:#dc2626>✘</gradient> <red><white>{value}</white> musí být kladné."
    invalid-uuid:         "<gradient:#fca5a5:#dc2626>✘</gradient> <red><white>{value}</white> není platné UUID."
    invalid-enum:         "<gradient:#fca5a5:#dc2626>✘</gradient> <red><white>{value}</white> není jedním z: <gray>{options}</gray>."
    expected-single-word: "<gradient:#fca5a5:#dc2626>✘</gradient> <red>Očekáváno jedno slovo, obdrženo: <white>{value}</white>."
    player-not-online:    "<gradient:#fca5a5:#dc2626>✘</gradient> <red>Hráč <white>{value}</white> není online."
    player-unknown:       "<gradient:#fca5a5:#dc2626>✘</gradient> <red>Neznámý hráč: <white>{value}</white>."
    internal:             "<gradient:#fca5a5:#dc2626>✘</gradient> <red>Interní chyba: <white>{message}</white></red>"
  usage: "<gradient:#a5f3fc:#06b6d4>▸</gradient> <gray>Použití: <white>{usage}</white>"

command:
  vote:
    description: 'Otevřít menu hlasování nebo zobrazit hlasovací stránky'
  votes:
    description: 'Zobrazit statistiky hlasování'
  votetop:
    description: 'Zobrazit žebříček hlasování'
  votereload:
    description: 'Znovu načíst konfiguraci JExVote'
  votereset:
    description: 'Resetovat statistiky hlasování hráče'
