# ============================================
# Database Type Selection
# ============================================
# Supported types: H2, MYSQL, MARIADB, POSTGRESQL, ORACLE, MSSQL_SERVER, SQLITE, HSQLDB
# Default: H2 (embedded, no external database required)
database.type=H2

# ============================================
# H2 Database Configuration (Default - Embedded)
# ============================================
h2.url=jdbc:h2:file:./plugins/JExVote/database/jexvote;MODE=MySQL;AUTO_SERVER=TRUE
h2.driver=org.h2.Driver
h2.dialect=org.hibernate.dialect.H2Dialect
h2.username=sa
h2.password=

# ============================================
# MySQL Database Configuration
# ============================================
mysql.url=jdbc:mysql://localhost:3306/jexvote?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC&characterEncoding=UTF-8
mysql.driver=com.mysql.cj.jdbc.Driver
mysql.dialect=org.hibernate.dialect.MySQLDialect
mysql.username=root
mysql.password=change_me

# ============================================
# MariaDB Database Configuration
# ============================================
mariadb.url=jdbc:mariadb://localhost:3306/jexvote?useSSL=false&serverTimezone=UTC&characterEncoding=UTF-8
mariadb.driver=org.mariadb.jdbc.Driver
mariadb.dialect=org.hibernate.dialect.MariaDBDialect
mariadb.username=root
mariadb.password=change_me

# ============================================
# PostgreSQL Database Configuration
# ============================================
postgresql.url=jdbc:postgresql://localhost:5432/jexvote
postgresql.driver=org.postgresql.Driver
postgresql.dialect=org.hibernate.dialect.PostgreSQLDialect
postgresql.username=postgres
postgresql.password=change_me

# ============================================
# Hibernate Configuration
# ============================================
# Connection pool size (built-in DriverManagerConnectionProvider). Default 20 is
# too small: a mass logout fires many async writes on virtual threads at once and
# exhausts the pool ("internal connection pool has reached its maximum size").
# 50 gives headroom for concurrent bursts.
hibernate.connection.pool_size=50

hibernate.hbm2ddl.auto=update
hibernate.show_sql=false
hibernate.format_sql=false
hibernate.highlight_sql=false
hibernate.use_sql_comments=false
hibernate.jdbc.batch_size=25
hibernate.order_inserts=true
hibernate.order_updates=true
hibernate.generate_statistics=false
