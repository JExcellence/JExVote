# ╔═══════════════════════════════════════════════════════════════╗
# ║                    JExVote Configuration                     ║
# ╠═══════════════════════════════════════════════════════════════╣
# ║  All-in-one vote listener with built-in Votifier protocol    ║
# ║  support (v1 RSA + v2 HMAC). No NuVotifier needed.          ║
# ╚═══════════════════════════════════════════════════════════════╝

# ── Votifier Server ─────────────────────────────────────────────
# The built-in vote receiver. Compatible with all vote sites
# that support the Votifier or NuVotifier protocol.
votifier:
  # Leave empty to bind on all interfaces (0.0.0.0)
  host: ''
  # Port the Votifier server listens on (default: 8192)
  # Must match the port configured on vote listing sites.
  port: 8192
  # Shared secret for Votifier v2 protocol (HMAC-SHA256).
  # Leave empty on first run — a token will be auto-generated.
  # Copy this token to your vote site configuration.
  token: ''

# ── Broadcast ───────────────────────────────────────────────────
# Public chat announcement when someone votes.
broadcast:
  # Who receives the broadcast:
  #   all    — all online players including the voter
  #   others — all online players EXCEPT the voter
  #   none   — disable broadcasts entirely
  mode: 'all'
  # Minimum seconds between broadcasts (anti-spam).
  # If a vote arrives within this window, the broadcast is silently skipped.
  # Set to 0 to broadcast every vote. (1800 = 30 minutes)
  cooldown: 0

# ── Private Message ─────────────────────────────────────────────
# Personal "thank you" message sent only to the voter.
private-message:
  # Whether the voter receives a private thank-you message
  enabled: true

# ── Offline Vote Queue ──────────────────────────────────────────
# When a player votes while offline, queue their rewards
# and deliver them on next login.
offline-vote-queue: true

# ── Vote Streak ─────────────────────────────────────────────────
streak:
  # Hours before a streak is considered broken.
  # Default 36h gives a generous buffer for daily voting.
  timeout-hours: 36

  # How streak milestone rewards are delivered:
  #   manual — player claims each milestone reward on click in the /vote streak GUI (default)
  #   auto   — granted immediately when the streak milestone is reached
  claim-mode: 'manual'

  # ── Streak Freeze (Duolingo-style) ────────────────────────────
  # A Streak Freeze protects a player's streak when they miss a vote.
  # Freezes auto-equip: if a vote arrives after the streak would have
  # broken, the needed freezes are consumed automatically and the
  # streak survives — no player action required.
  freeze:
    # Master switch.
    enabled: true
    # Free freezes granted once, on first profile creation (and back-filled
    # one time to existing players). 1 = everyone starts protected once.
    free-amount: 1
    # Vote points charged per purchased freeze (/vote freeze).
    cost-points: 5
    # Max freezes a player may own without a permission override.
    # A player with 'jexvote.freeze.max.<n>' may own up to <n> instead
    # (the highest matching node wins).
    default-max: 3
    # Grace time a single freeze covers. Each freeze absorbs one window of
    # this many hours beyond the normal streak timeout. Missing more than
    # one window consumes multiple freezes.
    duration-hours: 24

  # Bonus commands executed at specific streak milestones — IN ADDITION to
  # rewards.yml's streak-rewards, unconditionally (not gated by claim-mode).
  # Left empty by default: the day 7/14/30 milestones already grant diamonds
  # via rewards.yml, and having both here too was a double-grant left over
  # from before rewards.yml had a streak-rewards section. Only add entries
  # here for something rewards.yml genuinely can't express (e.g. a raw
  # server-specific command) — anything expressible as an AbstractReward
  # belongs in rewards.yml so it's styled, tracked, and shown in /vote.
  # Placeholders: {player}, {service}, {streak}
  bonus-commands: {}

# ── Commands on Vote ────────────────────────────────────────────
# Commands executed every time a vote is received.
# Placeholders: {player}, {service}, {streak}
commands-on-vote: []
#  - 'give {player} diamond 1'
#  - 'eco give {player} 100'

# ── Vote Records ────────────────────────────────────────────────
records:
  # How long to keep individual vote records (days).
  # Set to 0 to keep forever.
  retention-days: 90

# ── Multipliers (Premium) ───────────────────────────────────────
# Scales vote rewards during configured windows.
# Applies to: vote POINTS (exact) and top-level numeric reward
# amounts (xp/currency). NOTE: amounts nested inside composite/
# chance/lucky rewards are NOT scaled — only their own top-level
# 'amount' field is. Requires the Premium edition.
multipliers:
  weekend:
    # Master switch for the weekend multiplier.
    enabled: false
    # The factor applied during the weekend window to vote points + coin/XP
    # reward amounts. Kept at 1.2 so this stays a minor additive-style nudge
    # rather than a full multiplicative income lever (economy doc cap = 2).
    factor: 1.2
    # Which days count as "weekend" (English DayOfWeek names).
    days:
      - SATURDAY
      - SUNDAY
    # Timezone used to determine the current day.
    timezone: 'UTC'

# ── Vote Party (Premium) ────────────────────────────────────────
# A shared, server-wide vote counter. When it reaches the target,
# every player who contributed to that party is rewarded (online
# players immediately, offline players on next login), then the
# counter resets for the next party.
# Party rewards are configured in rewards.yml under 'vote-party-rewards'.
# Requires the Premium edition.
vote-party:
  # Premium-only feature. On the Free edition this stays disabled regardless.
  enabled: true
  # Number of votes required to complete a party.
  target: 100

# ── Vote Gifting ────────────────────────────────────────────────
# Lets active voters keep a friend's streak alive. A gift advances ONLY
# the receiver's streak (+1 and resets their timeout) — no reward items
# move, and the gifter keeps their own vote and rewards in full.
#   /vote gift <player>  — gift a specific player
#   /vote gift random    — gift a random online player (never yourself)
vote-gift:
  # Master switch.
  enabled: true
  # Gifts a player may send per day. A player with 'jexvote.gift.daily.<n>'
  # may send up to <n> instead (the highest matching node wins).
  daily-limit: 1
  # Require the gifter to have voted today before they can gift
  # (matches "redirect today's live vote"). Set false to allow gifting
  # without voting first.
  require-vote-today: true
  # Day-boundary timezone for both the daily gift limit and the
  # "voted today" check.
  timezone: 'UTC'

# ── Fly redemption ────────────────────────────────────────────────────────────
# Redeem vote points for temporary flight via /vote fly. Requires JExEssentials.
fly:
  # Master switch.
  enabled: true
  # Vote points charged per redemption.
  cost-points: 5
  # Minutes of flight granted per redemption (default: 1 token = 45 min).
  minutes: 45
  # One-time cost (vote points) of the permanent "event auto-fly" perk
  # (/vote eventfly). Grants the jexoneblock.eventfly permission, which makes
  # JExOneblock auto-enable flight while any island event is active.
  event-fly-cost-points: 75

  # Sound effects for fly redemption
  effects:
    # Sound played when flight is granted
    grant-sound: ENTITY_ENDER_DRAGON_FLAP
    grant-volume: 1.0
    grant-pitch: 1.0
    # Sound played when flight expires
    expire-sound: ENTITY_ENDER_DRAGON_HURT
    expire-volume: 1.0
    expire-pitch: 1.0

  # Display settings for fly in the rewards GUI
  display:
    name: "<gradient:#a5f3fc:#06b6d4>❄ Fly Time</gradient>"
    lore:
      - "<gray>Redeem vote points for temporary flight."
      - "<gray>Useful for building and exploring!"

# ── Vote Effects ─────────────────────────────────────────────────────────────
# Visual and audio effects when a player receives vote rewards.
vote-effects:
  # Sound played on every vote
  vote:
    sound: ENTITY_PLAYER_LEVELUP
    volume: 1.0
    pitch: 1.0

  # Sound played when a streak milestone is reached
  streak:
    sound: ENTITY_PLAYER_LEVELUP
    volume: 1.0
    pitch: 1.2

  # Sound and title played when a streak milestone reward is granted
  milestone:
    sound: UI_TOAST_CHALLENGE_COMPLETE
    volume: 1.0
    pitch: 1.0
    title: "<gradient:#86efac:#16a34a>Vote Streak!</gradient>"
    subtitle: "<gray>You reached a new milestone!</gray>"
    fade-in: 10
    stay: 40
    fade-out: 10

# Embedded REST API consumed by the Mythblock web backend (vote proxy).
# Shares the HMAC scheme with JExOneblock; the secret must match the web
# stack's JEXONE_API_SECRET. NEVER hardcode the secret here — this repo is
# public. Set JEXONE_API_SECRET in the server process's environment and the
# "$ENV:" prefix resolves it at load time.
api:
  enabled: true
  port: 8096
  secret: "$ENV:JEXONE_API_SECRET"
  cors-origin: "https://mythblock.me"
  rate-limit-per-minute: 60
