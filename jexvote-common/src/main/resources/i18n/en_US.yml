    cost: '  <dark_gray>▸</dark_gray> <gray>Cost:</gray> <gradient:#d8b4fe:#9333ea>{cost} points</gradient>'
    duration: '  <dark_gray>▸</dark_gray> <gray>Covers:</gray> <white>{duration}h per freeze</white>'
    buy-hint: '  <gradient:#86efac:#16a34a>Click to buy</gradient> <dark_gray>(or /vote freeze)</dark_gray>'
