    weekend: '  <dark_gray>▸</dark_gray> <gray>Weekend factor:</gray> <yellow>{factor}×</yellow>'
    days: '  <dark_gray>▸</dark_gray> <gray>Days:</gray> <white>{days}</white>'
  party:
    name: '<gradient:#fde047:#f59e0b>✦ Vote Party</gradient>'
