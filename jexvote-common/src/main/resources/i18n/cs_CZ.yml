# JExVote — České překlady

prefix: '<dark_gray>[<gradient:#86efac:#16a34a>Vote</gradient><dark_gray>] '

_defaults:
  title: '<gray>Menu'
  back: '<gray>Zpět'
  previous: '<gray>Předchozí stránka'
  next: '<gray>Další stránka'
  loading: '<gray>Načítání...'
  page:
    name: '<gray>Stránka <white>{page}</white> / <white>{total_pages}</white>'
    lore:
      - ''

vote:
  broadcast: '<dark_gray>[<gradient:#86efac:#16a34a>Vote</gradient><dark_gray>]</dark_gray> <gradient:#86efac:#16a34a>{player}</gradient> <gray>hlasoval na</gray> <gradient:#a5f3fc:#06b6d4>{service}</gradient><gray>!</gray>'
  received: '<gradient:#86efac:#16a34a>✔</gradient> <gray>Děkujeme za hlasování na</gray> <gradient:#a5f3fc:#06b6d4>{service}</gradient><gray>!</gray> <gray>Série:</gray> <gradient:#fde047:#f59e0b>{streak}</gradient>'
  pending_rewards: '<gradient:#86efac:#16a34a>✔</gradient> <gray>Máte</gray> <gradient:#fde047:#f59e0b>{count}</gradient> <gray>čekající odměnu/y za hlasování! Doručuji...</gray>'
  no_permission: '<gradient:#fca5a5:#dc2626>✘</gradient> <red>Na toto nemáte oprávnění.</red>'
  player_not_found: '<gradient:#fca5a5:#dc2626>✘</gradient> <red>Hráč nenalezen:</red> <white>{player}</white>'
  stats:
    header: '<dark_gray>━━━━ <gradient:#fde047:#f59e0b><bold>Statistiky hlasování</bold></gradient> <dark_gray>━━━━'
    total: '<dark_gray>▸</dark_gray> <gray>Celkem hlasů:</gray> <white>{total}</white>'
    monthly: '<dark_gray>▸</dark_gray> <gray>Měsíční hlasy:</gray> <white>{monthly}</white>'
    streak: '<dark_gray>▸</dark_gray> <gray>Aktuální série:</gray> <gradient:#86efac:#16a34a>{streak}</gradient>'
    highest: '<dark_gray>▸</dark_gray> <gray>Nejvyšší série:</gray> <gradient:#fde047:#f59e0b>{highest}</gradient>'
    points: '<dark_gray>▸</dark_gray> <gray>Body za hlasování:</gray> <gradient:#d8b4fe:#9333ea>{points}</gradient>'
  leaderboard:
    header: '<dark_gray>━━━━ <gradient:#fde047:#f59e0b><bold>Top hlasující</bold></gradient> <dark_gray>━━━━'
    entry: '<dark_gray>▸</dark_gray> <gradient:#fde047:#f59e0b>{rank}.</gradient> <white>{player}</white> <dark_gray>—</dark_gray> <gradient:#86efac:#16a34a>{votes} hlasů</gradient>'
    empty: '<dark_gray>▸</dark_gray> <gray>Zatím žádné hlasy.</gray>'
  reload: '<gradient:#86efac:#16a34a>✔</gradient> <gray>Konfigurace JExVote znovu načtena.</gray>'
  reset:
    success: '<gradient:#86efac:#16a34a>✔</gradient> <gray>Statistiky hlasování pro</gray> <white>{player}</white> <gray>resetovány.</gray>'
    all_success: '<gradient:#86efac:#16a34a>✔</gradient> <gray>Měsíční hlasy pro všechny hráče resetovány.</gray>'
  sites:
    header: '<dark_gray>━━━━ <gradient:#a5f3fc:#06b6d4><bold>Hlasovací stránky</bold></gradient> <dark_gray>━━━━'
    entry: '<dark_gray>▸</dark_gray> <gradient:#86efac:#16a34a>{name}</gradient> <dark_gray>—</dark_gray> <gradient:#a5f3fc:#06b6d4>Klikni pro hlasování</gradient>'
    no_sites: '<dark_gray>▸</dark_gray> <gray>Žádné hlasovací stránky nakonfigurovány.</gray>'

vote_overview:
  title: '<dark_gray>Přehled hlasování'

vote_leaderboard:
  title: '<dark_gray>Žebříček hlasování'

vote_streak:
  title: '<dark_gray>Série hlasování'

vote_shop:
  title: '<dark_gray>Obchod za hlasy'

# ── Built-in JExCommand keys ──────────────────────────────────────────────────

jexcommand:
  error:
    no-permission:        "<gradient:#fca5a5:#dc2626>✘</gradient> <red>Chybějící oprávnění: <white>{permission}</white>."
    player-only:          "<gradient:#fca5a5:#dc2626>✘</gradient> <red>Tento příkaz je pouze pro hráče."
    console-only:         "<gradient:#fca5a5:#dc2626>✘</gradient> <red>Tento příkaz je pouze pro konzoli."
    invalid-argument:     "<gradient:#fca5a5:#dc2626>✘</gradient> <red>Neplatný argument <white>{value}</white> pro <white>{name}</white>."
    missing-argument:     "<gradient:#fca5a5:#dc2626>✘</gradient> <red>Chybějící argument: <white>{name}</white>."
    too-many-arguments:   "<gradient:#fca5a5:#dc2626>✘</gradient> <red>Příliš mnoho argumentů — neočekávaný: <white>{value}</white>."
    invalid-long:         "<gradient:#fca5a5:#dc2626>✘</gradient> <red><white>{value}</white> není celé číslo."
    invalid-double:       "<gradient:#fca5a5:#dc2626>✘</gradient> <red><white>{value}</white> není číslo."
    not-positive-long:    "<gradient:#fca5a5:#dc2626>✘</gradient> <red><white>{value}</white> musí být kladné."
    not-positive-double:  "<gradient:#fca5a5:#dc2626>✘</gradient> <red><white>{value}</white> musí být kladné."
    invalid-uuid:         "<gradient:#fca5a5:#dc2626>✘</gradient> <red><white>{value}</white> není platné UUID."
    invalid-enum:         "<gradient:#fca5a5:#dc2626>✘</gradient> <red><white>{value}</white> není jedním z: <gray>{options}</gray>."
    expected-single-word: "<gradient:#fca5a5:#dc2626>✘</gradient> <red>Očekáváno jedno slovo, obdrženo: <white>{value}</white>."
    player-not-online:    "<gradient:#fca5a5:#dc2626>✘</gradient> <red>Hráč <white>{value}</white> není online."
    player-unknown:       "<gradient:#fca5a5:#dc2626>✘</gradient> <red>Neznámý hráč: <white>{value}</white>."
    internal:             "<gradient:#fca5a5:#dc2626>✘</gradient> <red>Interní chyba: <white>{message}</white></red>"
  usage: "<gradient:#a5f3fc:#06b6d4>▸</gradient> <gray>Použití: <white>{usage}</white>"

command:
  vote:
    description: 'Otevřít menu hlasování nebo zobrazit hlasovací stránky'
  votes:
    description: 'Zobrazit statistiky hlasování'
  votetop:
    description: 'Zobrazit žebříček hlasování'
  votereload:
    description: 'Znovu načíst konfiguraci JExVote'
  votereset:
    description: 'Resetovat statistiky hlasování hráče'
